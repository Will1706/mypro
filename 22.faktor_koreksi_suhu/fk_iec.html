<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

    <title>Kalkulator Faktor Koreksi Suhu</title>

    <style>
        /* Custom styles for a clean, mobile-focused look */
        body {
            background-color: #f0f2f5; /* Light gray background */
        }
        .converter-container {
            max-width: 400px; /* Max width for better viewing on larger screens */
            margin-top: 50px;
        }
        .card {
            border: none; /* Remove card border */
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* Subtle shadow for depth */
        }
        .result-display {
            font-weight: bold;
            color: #0d6efd; /* Bootstrap primary color */
            font-size: 2.5rem; /* Larger font for the result */
            min-height: 50px; /* Prevent layout shift */
        }
        .form-label {
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container converter-container">
        <div class="card p-4">
            <div class="card-body">
                <h4 class="card-title text-center pb-3 mb-4 border-bottom">Faktor Koreksi Suhu</h4>

                <div class="mb-3">
                    <label for="conductorType" class="form-label">Pilih Jenis Konduktor</label>
                    <select class="form-select form-select-lg" id="conductorType" onchange="updateFormulaDisplay(); hitungKoreksi();">
                        <option value="Cu" selected>Tembaga (Cu)</option>
                        <option value="Al">Aluminium (Al)</option>
                    </select>
                </div>
                
                <div class="mb-4">
                    <label for="suhuInput" class="form-label">Masukkan Suhu (°C)</label>
                    <input type="number" class="form-control form-control-lg" id="suhuInput" placeholder="Ketik suhu di sini..." step="any" oninput="hitungKoreksi()">
                </div>
                
                <div class="text-center">
                    <h6 class="text-muted">Faktor Koreksi</h6>
                    <h2 class="result-display" id="hasilKoreksi">-</h2>
                </div>
            </div>
        </div>
        
        <div class="text-center text-muted mt-3">
            <small id="formulaText">Rumus: k = 254.5 / (234.5 + t)</small>
        </div>

        <footer class="text-center mt-5">
            <hr>
            <p class="text-muted small">Williyanto Adi</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

    <script>
        const formulaDisplay = document.getElementById('formulaText');
        const formulas = {
            Cu: 'Rumus: k = 254.5 / (234.5 + t)',
            Al: 'Rumus: k = 248 / (228 + t)'
        };

        function updateFormulaDisplay() {
            const conductorType = document.getElementById('conductorType').value;
            formulaDisplay.textContent = formulas[conductorType];
        }

        function hitungKoreksi() {
            const conductorType = document.getElementById('conductorType').value;
            const inputSuhu = document.getElementById('suhuInput');
            const displayHasil = document.getElementById('hasilKoreksi');
            const suhu = parseFloat(inputSuhu.value);

            if (isNaN(suhu)) {
                displayHasil.textContent = '-';
                return;
            }

            let faktorKoreksi;
            if (conductorType === 'Cu') {
                faktorKoreksi = 254.5 / (234.5 + suhu);
            } else if (conductorType === 'Al') {
                faktorKoreksi = 248 / (228 + suhu);
            }

            displayHasil.textContent = faktorKoreksi.toFixed(4);
        }
        
        updateFormulaDisplay();
    </script>
</body>
</html>
