<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Hambatan Konduktor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-2xl mx-auto bg-white rounded-xl shadow-md p-6 m-4">
        
        <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">
            Kalkulator Hambatan Konduktor 🧮
        </h1>

        <div class="space-y-4">
            
            <div class="flex gap-4">
                <div class="w-1/2">
                    <label for="pembacaanAlat" class="block text-sm font-bold text-gray-700">Pembacaan Alat</label>
                    <input type="text" name="pembacaanAlat" id="pembacaanAlat" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
                <div class="w-1/2">
                    <label for="panjang" class="block text-sm font-bold text-gray-700">Panjang</label>
                    <input type="text" name="panjang" id="panjang" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
            </div>

            <div class="flex gap-4">
                <div class="w-1/2">
                    <label for="suhu" class="block text-sm font-bold text-gray-700">Suhu</label>
                    <input type="text" name="suhu" id="suhu" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
                <div class="w-1/2">
                    <label for="faktorKoreksi" class="block text-sm font-bold text-gray-700">Faktor Koreksi</label>
                    <input type="text" name="faktorKoreksi" id="faktorKoreksi" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
            </div>

            <div class="flex gap-4">
                <div class="w-1/3">
                    <label for="konduktor" class="block text-sm font-bold text-gray-700">Konduktor</label>
                    <input type="text" name="konduktor" id="konduktor" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
                <div class="w-1/3">
                    <label for="penampang" class="block text-sm font-bold text-gray-700">Penampang</label>
                    <input type="text" name="penampang" id="penampang" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
                <div class="w-1/3">
                    <label for="spekMax" class="block text-sm font-bold text-gray-700">Spek. Max</label>
                    <input type="text" name="spekMax" id="spekMax" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
            </div>
            
            <div class="pt-4 flex flex-wrap gap-2">
                 <button type="submit" class="flex-1 min-w-min justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Hitung
                </button>
                <button type="button" class="flex-1 min-w-min justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    IEC
                </button>
                <button type="button" class="flex-1 min-w-min justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    ICEA
                </button>
                <button type="button" class="flex-1 min-w-min justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    AS/NZS
                </button>
                <button type="button" class="flex-1 min-w-min justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    SPLN
                </button>
            </div>

        </div>

    </div>

</body>
</html>
