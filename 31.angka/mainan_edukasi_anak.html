<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunia Angka Anak Pintar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #ff7f50;
            --secondary-color: #6c5ce7;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f0f2f5;
            background-image: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .main-container {
            max-width: 800px;
            margin: auto;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            padding: 40px;
            border: 10px solid white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .title-font {
            font-family: 'Fredoka One', cursive;
            color: var(--primary-color);
            text-shadow: 2px 2px 0px #fff;
        }

        /* Tombol Menu */
        .mode-card {
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 25px;
            padding: 20px;
            border: 3px solid transparent;
        }

        .mode-card:hover {
            transform: scale(1.05);
            border-color: var(--primary-color);
            background: #fff9f0;
        }

        /* Tombol Angka */
        .number-btn {
            width: 75px;
            height: 75px;
            border-radius: 20px;
            border: none;
            color: white;
            font-family: 'Fredoka One', cursive;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 0px rgba(0,0,0,0.15);
        }

        .number-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* Warna Tombol */
        .btn-1 { background: #ff4757; } .btn-2 { background: #2ed573; }
        .btn-3 { background: #1e90ff; } .btn-4 { background: #ffa502; }
        .btn-5 { background: #3742fa; } .btn-6 { background: #ff6b81; }
        .btn-7 { background: #70a1ff; } .btn-8 { background: #7bed9f; }
        .btn-9 { background: #5352ed; } .btn-10 { background: #eccc68; }

        .hidden { display: none !important; }

        #output-text {
            font-family: 'Fredoka One', cursive;
            font-size: 2.5rem;
            min-height: 80px;
        }

        .score-badge {
            background: var(--secondary-color);
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container main-container">
    <div class="glass-card text-center animate__animated animate__zoomIn">
        
        <div id="main-menu">
            <h1 class="title-font display-3 mb-4">Halo Teman-Teman!</h1>
            <p class="text-muted mb-5 fs-5">Pilih mode bermain yang kamu suka:</p>
            
            <div class="row g-4">
                <div class="col-md-6" onclick="switchMode('belajar')">
                    <div class="mode-card bg-light shadow-sm">
                        <div class="fs-1 mb-2">📚</div>
                        <h3 class="title-font">Belajar Angka</h3>
                        <p class="small text-muted">Klik angka untuk tahu namanya</p>
                    </div>
                </div>
                <div class="col-md-6" onclick="switchMode('tebak')">
                    <div class="mode-card bg-light shadow-sm">
                        <div class="fs-1 mb-2">🎮</div>
                        <h3 class="title-font">Tebak Angka</h3>
                        <p class="small text-muted">Ayo uji kepintaranmu!</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="game-area" class="hidden">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <button class="btn btn-sm btn-outline-secondary rounded-pill" onclick="goHome()">🏠 Menu Utama</button>
                <div id="score-container" class="hidden">
                    <span class="score-badge">Skor: <span id="skor">0</span></span>
                </div>
            </div>

            <h2 id="mode-title" class="title-font mb-4">Mode Belajar</h2>
            
            <div id="display-screen" class="p-4 mb-4 bg-light rounded-4 border border-2">
                <div id="output-text" class="animate__animated text-primary">
                    Klik salah satu angka!
                </div>
            </div>

            <div class="d-flex flex-wrap justify-content-center gap-3">
                <script>
                    for(let i=1; i<=10; i++) {
                        document.write(`
                            <button class="number-btn btn-${i}" onclick="handleNumberClick(${i})">
                                ${i}
                            </button>
                        `);
                    }
                </script>
            </div>
        </div>

    </div>
</div>

<script>
    let currentMode = ''; // 'belajar' atau 'tebak'
    let targetAngka = 0;
    let skor = 0;
    const daftarNama = ["Satu", "Dua", "Tiga", "Empat", "Lima", "Enam", "Tujuh", "Delapan", "Sembilan", "Sepuluh"];
    const synth = window.speechSynthesis;

    function bicara(teks) {
        synth.cancel();
        const utterance = new SpeechSynthesisUtterance(teks);
        utterance.lang = 'id-ID';
        utterance.pitch = 1.2;
        synth.speak(utterance);
    }

    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('game-area').classList.remove('hidden');
        
        if (mode === 'belajar') {
            document.getElementById('mode-title').innerText = "Belajar Mengenal Angka";
            document.getElementById('score-container').classList.add('hidden');
            document.getElementById('output-text').innerText = "Klik angka di bawah!";
            document.getElementById('output-text').className = "animate__animated text-primary";
            bicara("Ayo kita belajar mengenal angka!");
        } else {
            document.getElementById('mode-title').innerText = "Tantangan Tebak Angka";
            document.getElementById('score-container').classList.remove('hidden');
            skor = 0;
            document.getElementById('skor').innerText = skor;
            buatPertanyaanBaru();
        }
    }

    function goHome() {
        document.getElementById('main-menu').classList.remove('hidden');
        document.getElementById('game-area').classList.add('hidden');
        currentMode = '';
        synth.cancel();
    }

    function handleNumberClick(n) {
        if (currentMode === 'belajar') {
            modeBelajar(n);
        } else {
            modeTebak(n);
        }
    }

    // LOGIKA MODE BELAJAR
    function modeBelajar(n) {
        const text = daftarNama[n-1];
        const el = document.getElementById('output-text');
        
        el.innerText = `Ini Angka ${text}`;
        el.className = "animate__animated animate__bounceIn text-primary";
        bicara(`Ini angka ${text}`);
        
        setTimeout(() => el.classList.remove('animate__bounceIn'), 500);
    }

    // LOGIKA MODE TEBAK
    function buatPertanyaanBaru() {
        targetAngka = Math.floor(Math.random() * 10) + 1;
        const el = document.getElementById('output-text');
        
        el.innerText = `Mana angka ${targetAngka}?`;
        el.className = "animate__animated animate__pulse animate__infinite text-dark";
        bicara(`Coba cari, mana angka ${daftarNama[targetAngka-1]}?`);
    }

    function modeTebak(n) {
        const el = document.getElementById('output-text');
        el.classList.remove('animate__infinite', 'animate__pulse');

        if (n === targetAngka) {
            skor += 10;
            document.getElementById('skor').innerText = skor;
            el.innerText = "Yeyy! Kamu Benar! 🎉";
            el.className = "animate__animated animate__tada text-success";
            bicara("Yeyy! Kamu benar! Hebat!");
            
            setTimeout(buatPertanyaanBaru, 2000);
        } else {
            el.innerText = "Oow! Coba lagi ya! ⛔";
            el.className = "animate__animated animate__shakeX text-danger";
            bicara("O ow! Salah, ayo coba lagi!");
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
