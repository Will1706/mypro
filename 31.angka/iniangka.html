<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Interactive Numbers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            color: white;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        .number-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid white;
            background: transparent;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            text-decoration: none;
        }

        .number-circle:hover {
            background: white;
            color: #764ba2;
            transform: scale(1.2) rotate(10deg);
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        .number-circle.active {
            background: #ffcc00;
            border-color: #ffcc00;
            color: #333;
            transform: scale(1.1);
        }

        #display-area {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 30px;
        }

        .output-text {
            font-size: 2.5rem;
            font-weight: 700;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }

        /* Badge untuk variasi */
        .badge-number {
            background: rgba(0,0,0,0.2);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8 text-center">
            <div class="glass-card animate__animated animate__fadeIn">
                <span class="badge-number">Interactive Dashboard</span>
                <h1 class="mb-4 fw-bold">Magic Number Series</h1>
                
                <div class="d-flex flex-wrap justify-content-center gap-3 mb-2">
                    <script>
                        const numbers = ["Satu", "Dua", "Tiga", "Empat", "Lima", "Enam", "Tujuh", "Delapan", "Sembilan", "Sepuluh"];
                        for(let i=1; i<=10; i++) {
                            document.write(`
                                <div class="number-circle" onclick="revealNumber(this, '${numbers[i-1]}')">
                                    ${i}
                                </div>
                            `);
                        }
                    </script>
                </div>

                <div id="display-area">
                    <div id="text-container">
                        <p class="text-white-50 fs-5 animate__animated animate__pulse animate__infinite">Klik salah satu angka di atas...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentActive = null;

    function revealNumber(element, text) {
        const container = document.getElementById('text-container');
        
        // 1. Highlight tombol yang aktif
        if (currentActive) currentActive.classList.remove('active');
        element.classList.add('active');
        currentActive = element;

        // 2. Animasi Keluar
        container.classList.remove('animate__fadeInUp');
        container.classList.add('animate__fadeOutDown');

        // 3. Jeda untuk ganti teks
        setTimeout(() => {
            container.innerHTML = `<div class="output-text animate__animated animate__backInUp">Ini Angka <span class="text-warning">${text}</span></div>`;
            
            container.classList.remove('animate__fadeOutDown');
            container.classList.add('animate__fadeInUp');
        }, 300);
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
