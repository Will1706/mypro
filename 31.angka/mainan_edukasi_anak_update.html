<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunia Belajar Anak Pintar</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { 
            --primary-orange: #ff7f50; /* Warna Orange Kembali */
            --primary-blue: #0984e3; 
            --dark-blue: #074b83;    
            --neutral-bg: #f0f2f5;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--neutral-bg);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0;
        }
        .main-wrapper { width: 100%; padding: 20px 0; }
        .glass-card {
            background: #ffffff;
            border-radius: 40px; padding: 40px;
            border: 4px solid #dee2e6; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 950px; margin: auto;
            position: relative;
        }
        
        /* Judul Halaman Utama Warna Orange */
        .title-orange { 
            font-family: 'Fredoka One', cursive; 
            color: var(--primary-orange); 
            font-weight: normal; /* Teks Tidak Tebal */
        }
        
        .btn-item {
            width: 75px; height: 75px; border-radius: 20px; 
            border: none; background: var(--primary-blue); color: white;
            font-family: 'Fredoka One', cursive; font-size: 2.2rem; cursor: pointer;
            transition: all 0.1s; box-shadow: 0 6px 0px var(--dark-blue);
            user-select: none;
        }
        .btn-item:active { transform: translateY(4px); box-shadow: none; filter: brightness(1.1); }
        
        .mode-card {
            cursor: pointer; transition: 0.2s; border-radius: 25px; padding: 20px;
            background: #fff; border: 2px solid #eee; height: 100%;
        }
        .mode-card:hover { transform: translateY(-5px); border-color: var(--primary-orange); }

        .hidden { display: none !important; }
        
        #output-text { 
            font-family: 'Fredoka One', cursive; 
            font-size: 1.8rem; 
            min-height: 120px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            line-height: 1.4; 
            color: #2d3436;
            font-weight: normal; /* Teks Tidak Tebal */
        }

        /* Footer di Dalam Kotak */
        .inner-footer { 
            margin-top: 30px; 
            padding-top: 20px; 
            border-top: 1px solid #eee; 
            font-weight: normal; 
            color: #888; 
            font-size: 0.9rem;
        }

        .streak-info { font-size: 0.85rem; color: #999; font-weight: normal; margin-top: 5px; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="container">
        <div class="glass-card text-center animate__animated animate__fadeIn">
            
            <div id="main-menu">
                <h1 class="title-orange display-5 mb-2">Halo Anak Pintar!</h1>
                <p class="text-muted mb-4 fs-5" style="font-weight: normal;">Pilih mode belajar & bermain:</p>
                <div class="row g-3">
                    <div class="col-6 col-md-3" onclick="switchMode('belajar_angka')">
                        <div class="mode-card">
                            <div class="fs-1 mb-2">1️⃣</div>
                            <h6 class="title-orange" style="font-size: 1rem;">Belajar Angka</h6>
                        </div>
                    </div>
                    <div class="col-6 col-md-3" onclick="switchMode('tebak_angka')">
                        <div class="mode-card">
                            <div class="fs-1 mb-2">🎯</div>
                            <h6 class="title-orange" style="font-size: 1rem;">Tebak Angka</h6>
                        </div>
                    </div>
                    <div class="col-6 col-md-3" onclick="switchMode('belajar_huruf')">
                        <div class="mode-card">
                            <div class="fs-1 mb-2">🅰️</div>
                            <h6 class="title-orange" style="font-size: 1rem;">Belajar Huruf</h6>
                        </div>
                    </div>
                    <div class="col-6 col-md-3" onclick="switchMode('tebak_huruf')">
                        <div class="mode-card">
                            <div class="fs-1 mb-2">🧩</div>
                            <h6 class="title-orange" style="font-size: 1rem;">Tebak Huruf</h6>
                        </div>
                    </div>
                </div>
            </div>

            <div id="game-area" class="hidden">
                <div class="d-flex justify-content-between align-items-start mb-4">
                    <button class="btn btn-outline-secondary rounded-pill fw-normal" onclick="goHome()">🏠 Menu</button>
                    <div id="score-container" class="hidden text-end">
                        <span class="badge bg-primary rounded-pill p-2 px-4 fs-6 shadow-sm fw-normal">Skor: <span id="skor">0</span></span>
                        <div class="streak-info">Beruntun: <span id="streak-count">0</span></div>
                    </div>
                </div>

                <div id="display-screen" class="p-3 mb-4 bg-light rounded-4 border border-2">
                    <div id="output-text" class="animate__animated text-center">Ayo mulai!</div>
                </div>

                <div id="button-container" class="d-flex flex-wrap justify-content-center gap-3"></div>
            </div>

            <div class="inner-footer">
                Mainan Edukasi by : Williyanto Adi 2026
            </div>
        </div>
    </div>
</div>

<script>
    let currentMode = '';
    let targetObj = ''; 
    let skor = 0;
    let streak = 0;
    let audioAktif = null;
    let isProcessing = false;
    const hurufArr = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J'];
    const kataAngka = ["Nol", "Satu", "Dua", "Tiga", "Empat", "Lima", "Enam", "Tujuh", "Delapan", "Sembilan", "Sepuluh"];

    function selebrasi() {
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, zIndex: 999 });
    }

    async function putarAudio(namaFile) {
        if (audioAktif) { audioAktif.pause(); audioAktif.currentTime = 0; }
        return new Promise((resolve) => {
            audioAktif = new Audio("audio/" + namaFile.toString().toLowerCase() + ".mp3");
            audioAktif.onended = resolve;
            audioAktif.onerror = resolve;
            audioAktif.play().catch(e => resolve());
        });
    }

    function switchMode(mode) {
        currentMode = mode;
        isProcessing = false;
        skor = 0; streak = 0;
        
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('game-area').classList.remove('hidden');
        const container = document.getElementById('button-container');
        container.innerHTML = '';
        const out = document.getElementById('output-text');

        if (mode.includes('angka')) {
            for(let i=1; i<=10; i++) buatTombol(i);
        } else {
            hurufArr.forEach(h => buatTombol(h));
        }

        if (mode.startsWith('tebak')) {
            document.getElementById('score-container').classList.remove('hidden');
            updateDisplayScore();
            putarAudio(mode); 
            setTimeout(buatPertanyaanBaru, 2000);
        } else {
            document.getElementById('score-container').classList.add('hidden');
            out.innerText = mode === 'belajar_angka' ? "Klik pada angka" : "Klik pada huruf";
            putarAudio(mode);
        }
    }

    function buatTombol(label) {
        const btn = document.createElement('button');
        btn.className = "btn-item";
        btn.innerText = label;
        btn.onclick = function() { handleItemClick(label); };
        document.getElementById('button-container').appendChild(btn);
    }

    function updateDisplayScore() {
        document.getElementById('skor').innerText = skor;
        document.getElementById('streak-count').innerText = streak;
    }

    async function handleItemClick(val) {
        if (isProcessing) return;
        const el = document.getElementById('output-text');
        
        if (currentMode.startsWith('belajar')) {
            if (currentMode === 'belajar_angka') {
                const namaAngka = kataAngka[val];
                el.innerHTML = "Ini adalah angka " + '<span style="color: #0984e3;">' + namaAngka + "</span>";
            } else {
                el.innerHTML = "Ini adalah huruf " + '<span style="color: #0984e3;">' + val + "</span>";
            }
            
            el.classList.remove('animate__bounceIn');
            void el.offsetWidth; 
            el.classList.add('animate__bounceIn');
            putarAudio(val);
        } 
        else {
            isProcessing = true;
            if (val.toString() === targetObj.toString()) {
                skor += 10; streak++;
                updateDisplayScore();
                el.innerHTML = "Hebat! Benar! 🎉";
                el.className = "animate__animated animate__tada text-success";
                
                if (streak >= 3) {
                    selebrasi();
                    await putarAudio("bonus" + (Math.floor(Math.random() * 3) + 1));
                    streak = 0;
                } else {
                    await putarAudio('benar');
                }
                setTimeout(function() { isProcessing = false; buatPertanyaanBaru(); }, 1200);
            } else {
                streak = 0;
                updateDisplayScore();
                el.innerHTML = "Coba lagi ya! ⛔";
                el.className = "animate__animated animate__shakeX text-danger";
                await putarAudio('salah');
                setTimeout(function() { isProcessing = false; ulangiPertanyaan(); }, 1200);
            }
        }
    }

    function buatPertanyaanBaru() {
        if (!currentMode.startsWith('tebak')) return;
        if (currentMode === 'tebak_angka') {
            targetObj = Math.floor(Math.random() * 10) + 1;
        } else {
            targetObj = hurufArr[Math.floor(Math.random() * hurufArr.length)];
        }
        ulangiPertanyaan();
    }

    async function ulangiPertanyaan() {
        if (!currentMode.startsWith('tebak')) return;
        const el = document.getElementById('output-text');
        
        if (currentMode === 'tebak_angka') {
            const namaAngka = kataAngka[targetObj];
            el.innerText = "Yang mana angka " + namaAngka + "?";
        } else {
            el.innerText = "Yang mana huruf " + targetObj + "?";
        }
        
        el.className = "animate__animated animate__pulse animate__infinite";
        
        const instruksi = (currentMode === 'tebak_angka') ? 'cari_angka' : 'cari_huruf';
        await putarAudio(instruksi); 
        setTimeout(function() {
            if (currentMode.startsWith('tebak')) putarAudio(targetObj);
        }, 500); 
    }

    function goHome() {
        document.getElementById('main-menu').classList.remove('hidden');
        document.getElementById('game-area').classList.add('hidden');
        currentMode = '';
        if (audioAktif) { audioAktif.pause(); audioAktif = null; }
    }
</script>
</body>
</html>
