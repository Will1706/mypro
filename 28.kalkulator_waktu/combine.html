<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalkulator Waktu Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        :root { --primary: #4361ee; --secondary: #3f37c9; --bg: #f1f5f9; }
        body, html { height: 100%; margin: 0; overflow: hidden; background-color: var(--bg); font-family: 'Inter', sans-serif; }
        body { display: flex; justify-content: center; align-items: center; padding: 10px; }
        .main-card {
            width: 100%; max-width: 420px; height: 95vh; max-height: 850px;
            background: #fff; border-radius: 30px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .card-header-custom {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; padding: 15px; text-align: center; flex-shrink: 0;
        }
        .clock-badge { background: rgba(255, 255, 255, 0.2); border-radius: 12px; margin-top: 5px; display: inline-block; line-height: 1.4; }
        .nav-pills-custom { padding: 8px; background: #fff; border-bottom: 1px solid #f1f5f9; flex-shrink: 0; }
        .nav-pills .nav-link { font-weight: 600; color: #94a3b8; border-radius: 10px; font-size: 0.72rem; padding: 8px 4px; }
        .nav-pills .nav-link.active { background-color: var(--primary); }
        .card-body-content { padding: 15px 20px; flex-grow: 1; overflow-y: auto; scrollbar-width: none; }
        .card-body-content::-webkit-scrollbar { display: none; }
        .form-label { font-size: 0.65rem; font-weight: 700; color: #64748b; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-group-custom { 
            background: #f8fafc; border-radius: 12px; padding: 8px; border: 2px solid #e2e8f0; 
            transition: 0.3s; margin-bottom: 10px; display: flex; align-items: center; min-height: 48px; 
        }
        .form-control-pro { 
            background: transparent; border: none; font-size: 1rem; font-weight: 700; 
            text-align: center; color: #1e293b; width: 100%; font-family: 'Inter', sans-serif;
        }
        .form-control-pro:focus { box-shadow: none; outline: none; }
        .big-input { font-size: 1.3rem !important; }
        .result-box { border-radius: 20px; background: linear-gradient(135deg, #eff6ff, #dbeafe); border: 1px solid #bfdbfe; padding: 15px; margin-top: 5px; }
        .detail-table {
            width: 100%; margin-top: 15px; border-radius: 15px; overflow: hidden;
            background: #1e293b; color: white; font-size: 0.8rem;
        }
        .detail-table td { padding: 10px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .val-col { text-align: right; font-weight: 600; }
        .label-col { color: #94a3b8; }
        .footer-custom { padding: 10px; background: #fff; text-align: center; color: #94a3b8; font-size: 0.7rem; border-top: 1px solid #f1f5f9; flex-shrink: 0; }
        .reset-btn { color: #ef4444; font-size: 0.75rem; font-weight: 700; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="card-header-custom">
        <h6 class="mb-0 fw-bold">⏱️ Kalkulator Waktu Pro</h6>
        <div class="clock-badge" style="font-size: 0.7rem; padding: 5px 15px;">
            <span id="realtimeClock">Memuat waktu...</span>
        </div>
    </div>

    <div class="nav-pills-custom">
        <ul class="nav nav-pills nav-fill" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-selisih">Durasi</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-kedepan">Kedepan</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-tanggal">Tanggal</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-tambah">Tambah</button></li>
        </ul>
    </div>

    <div class="card-body-content">
        <div class="d-flex justify-content-end mb-3">
            <a class="reset-btn" onclick="globalReset()">🔄 Reset Semua</a>
        </div>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="tab-selisih">
                <label class="form-label">Waktu Mulai</label>
                <div class="input-group-custom">
                    <input type="text" id="mulai" class="form-control-pro big-input t-input" placeholder="00.00" maxlength="5">
                </div>
                <label class="form-label">Waktu Selesai</label>
                <div class="input-group-custom">
                    <input type="text" id="selesai" class="form-control-pro big-input t-input" placeholder="00.00" maxlength="5">
                </div>
                <div class="result-box text-center">
                    <small style="color: var(--primary); font-weight: 800; font-size: 0.6rem;">HASIL DURASI</small>
                    <h4 id="resSelisih" class="mb-0 fw-bold text-primary">0 Jam 0 Menit</h4>
                </div>
            </div>

            <div class="tab-pane fade" id="tab-kedepan">
                <label class="form-label">Mulai Dari (Hari, Tgl, Jam)</label>
                <div class="input-group-custom">
                    <input type="text" id="inputKedepan" class="form-control-pro bg-white">
                </div>
                <div class="row g-2">
                    <div class="col-6"><label class="form-label">Tambah Jam</label><div class="input-group-custom"><input type="number" id="kJam" class="form-control-pro big-input num-input" value="35"></div></div>
                    <div class="col-6"><label class="form-label">Tambah Menit</label><div class="input-group-custom"><input type="number" id="kMenit" class="form-control-pro big-input num-input" value="0"></div></div>
                </div>
                <div class="result-box text-center" style="background: #fff7ed; border-color: #ffedd5;">
                    <small style="color: #ea580c; font-weight: 800; font-size: 0.6rem;">WAKTU DI MASA DEPAN</small>
                    <h5 id="resKedepan" class="mb-1 fw-bold text-dark" style="font-size: 1rem;">--</h5>
                    <div id="resKedepanSub" class="text-muted small" style="font-size: 0.7rem;"></div>
                </div>
            </div>

            <div class="tab-pane fade" id="tab-tanggal">
                <div class="row g-2">
                    <div class="col-6"><label class="form-label">Tgl Mulai</label><div class="input-group-custom"><input type="date" id="startDate" class="form-control-pro"></div></div>
                    <div class="col-6"><label class="form-label">Tgl Selesai</label><div class="input-group-custom"><input type="date" id="endDate" class="form-control-pro"></div></div>
                </div>
                <div class="row g-2">
                    <div class="col-6"><label class="form-label">Jam Mulai</label><div class="input-group-custom"><input type="time" id="startTime" class="form-control-pro"></div></div>
                    <div class="col-6"><label class="form-label">Jam Selesai</label><div class="input-group-custom"><input type="time" id="endTime" class="form-control-pro"></div></div>
                </div>
                <div class="result-box text-center" style="background: var(--primary); border: none; color: white;">
                    <small style="opacity: 0.8; font-weight: 800; font-size: 0.6rem;">JARAK WAKTU</small>
                    <h5 id="resDate" class="mb-0 fw-bold">0 Hari, 0 Jam</h5>
                </div>
                <table class="detail-table">
                    <tr><td class="label-col">Total Jam</td><td id="detTotalHr" class="val-col">0</td></tr>
                    <tr><td class="label-col">Total Menit</td><td id="detTotalMin" class="val-col">0</td></tr>
                </table>
            </div>

            <div class="tab-pane fade" id="tab-tambah">
                <label class="form-label">Waktu Awal</label>
                <div class="input-group-custom"><input type="text" id="awalTambah" class="form-control-pro big-input t-input" maxlength="5"></div>
                <div class="row g-2">
                    <div class="col-6"><label class="form-label">Jam</label><div class="input-group-custom"><input type="number" id="pJam" class="form-control-pro big-input num-input" value="0"></div></div>
                    <div class="col-6"><label class="form-label">Menit</label><div class="input-group-custom"><input type="number" id="pMenit" class="form-control-pro big-input num-input" value="30"></div></div>
                </div>
                <div class="result-box text-center" style="background: #f0fdf4; border-color: #bbf7d0;">
                    <small style="color: #16a34a; font-weight: 800; font-size: 0.6rem;">ESTIMASI SELESAI</small>
                    <h4 id="resTambah" class="mb-0 fw-bold text-success">--:--</h4>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-custom">&copy; 2026 • Williyanto Adi</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/id.js"></script>
<script>
    let fpKedepan;

    function updateClock() {
        const now = new Date();
        const options = { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' };
        const tanggal = now.toLocaleDateString('id-ID', options);
        const jam = String(now.getHours()).padStart(2, '0');
        const menit = String(now.getMinutes()).padStart(2, '0');
        const detik = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('realtimeClock').innerText = `${tanggal} - ${jam}.${menit}.${detik}`;
    }

    function globalReset() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2,'0'), m = String(now.getMinutes()).padStart(2,'0');
        const y = now.getFullYear(), mon = String(now.getMonth()+1).padStart(2,'0'), d = String(now.getDate()).padStart(2,'0');

        const clockDot = `${h}.${m}`;
        document.getElementById('mulai').value = clockDot;
        document.getElementById('selesai').value = "";
        document.getElementById('awalTambah').value = clockDot;
        document.getElementById('startDate').value = `${y}-${mon}-${d}`;
        document.getElementById('endDate').value = `${y}-${mon}-${d}`;
        document.getElementById('startTime').value = `${h}:${m}`;
        document.getElementById('endTime').value = `${h}:${m}`;
        
        if(fpKedepan) fpKedepan.setDate(now);
        hitungSemua(); hitungTanggal(); hitungKedepan();
    }

    function getMins(id) {
        const el = document.getElementById(id);
        if (!el || !el.value) return null;
        const val = el.value.replace(/\D/g, '');
        let h = 0, m = 0;
        if (val.length <= 2) {
            h = parseInt(val) || 0;
        } else {
            h = parseInt(val.slice(0, -2)) || 0;
            m = parseInt(val.slice(-2)) || 0;
        }
        // Proteksi Nilai Waktu
        if (h > 23) h = 23;
        if (m > 59) m = 59;
        return (h * 60) + m;
    }

    function hitungSemua() {
        // Durasi
        const m1 = getMins('mulai'), m2 = getMins('selesai');
        if (m1 !== null && m2 !== null) {
            let d = m2 - m1; if (d < 0) d += 1440;
            document.getElementById('resSelisih').innerText = `${Math.floor(d/60)} Jam ${d%60} Menit`;
        }
        // Tambah
        const m3 = getMins('awalTambah');
        if (m3 !== null) {
            const addH = parseInt(document.getElementById('pJam').value) || 0;
            const addM = parseInt(document.getElementById('pMenit').value) || 0;
            let total = (m3 + (addH * 60) + addM) % 1440;
            if (total < 0) total += 1440;
            document.getElementById('resTambah').innerText = `${String(Math.floor(total/60)).padStart(2,'0')}.${String(total%60).padStart(2,'0')}`;
        }
    }

    function hitungTanggal() {
        const d1 = document.getElementById('startDate').value, t1 = document.getElementById('startTime').value;
        const d2 = document.getElementById('endDate').value, t2 = document.getElementById('endTime').value;
        if (d1 && t1 && d2 && t2) {
            const start = new Date(`${d1}T${t1}`), end = new Date(`${d2}T${t2}`);
            let ms = end - start;
            if (ms >= 0) {
                let totMin = Math.floor(ms / 60000);
                let d = Math.floor(totMin / 1440), h = Math.floor((totMin % 1440) / 60), m = totMin % 60;
                document.getElementById('resDate').innerText = `${d} Hari, ${h} Jam, ${m} Menit`;
                document.getElementById('detTotalHr').innerText = (totMin/60).toFixed(1) + " Jam";
                document.getElementById('detTotalMin').innerText = totMin.toLocaleString('id-ID') + " Menit";
            } else {
                document.getElementById('resDate').innerText = "Waktu Tidak Valid";
            }
        }
    }

    function hitungKedepan() {
        const baseDate = fpKedepan.selectedDates[0];
        if (!baseDate) return;
        let target = new Date(baseDate);
        target.setHours(target.getHours() + (parseInt(document.getElementById('kJam').value) || 0));
        target.setMinutes(target.getMinutes() + (parseInt(document.getElementById('kMenit').value) || 0));
        const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        const d = String(target.getDate()).padStart(2,'0'), m = String(target.getMonth()+1).padStart(2,'0'), y = target.getFullYear();
        const hh = String(target.getHours()).padStart(2,'0'), mm = String(target.getMinutes()).padStart(2,'0');
        document.getElementById('resKedepan').innerText = `${days[target.getDay()]}, ${d}/${m}/${y} ${hh}.${mm}`;
        const diffDays = Math.floor((target - baseDate) / (1000 * 60 * 60 * 24));
        document.getElementById('resKedepanSub').innerText = diffDays > 0 ? `Melompat ${diffDays} hari ke depan` : "Masih di hari yang sama";
    }

    window.onload = () => {
        fpKedepan = flatpickr("#inputKedepan", {
            locale: "id", enableTime: true, time_24hr: true,
            dateFormat: "l, d/m/Y H.i",
            onChange: (selectedDates) => {
                // Sinkronisasi: Update tab Tambah jika waktu di Kedepan diubah
                const d = selectedDates[0];
                const hh = String(d.getHours()).padStart(2, '0');
                const mm = String(d.getMinutes()).padStart(2, '0');
                document.getElementById('awalTambah').value = `${hh}.${mm}`;
                hitungKedepan();
                hitungSemua();
            }
        });

        document.querySelectorAll('.t-input').forEach(el => {
            el.addEventListener('input', e => {
                let v = e.target.value.replace(/\D/g, '');
                if (v.length >= 3) v = v.slice(0, -2) + "." + v.slice(-2);
                e.target.value = v; 
                hitungSemua();
            });
        });

        document.querySelectorAll('.num-input').forEach(el => {
            el.addEventListener('input', () => { hitungSemua(); hitungKedepan(); });
        });

        ['startDate', 'startTime', 'endDate', 'endTime'].forEach(id => {
            document.getElementById(id).addEventListener('change', hitungTanggal);
        });

        updateClock(); setInterval(updateClock, 1000);
        globalReset();
    };
</script>
</body>
</html>
