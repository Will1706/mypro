<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalkulator Waktu Fixed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #0d6efd; --bg: #f4f7f6; }
        body { 
            background-color: var(--bg); 
            font-family: 'Segoe UI', Roboto, sans-serif;
            height: 100vh; margin: 0; 
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }
        .main-card {
            width: 95%; max-width: 400px; height: 90vh;
            background: white; border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .card-header-custom {
            background: var(--primary); color: white;
            padding: 15px; text-align: center; flex-shrink: 0;
        }
        .nav-pills-custom {
            padding: 10px; background: #fff; border-bottom: 1px solid #eee; flex-shrink: 0;
        }
        .nav-pills .nav-link { font-weight: 600; color: #6c757d; border-radius: 12px; }
        .nav-pills .nav-link.active { background-color: var(--primary); }
        
        .card-body-content {
            padding: 20px; flex-grow: 1; overflow-y: auto;
        }
        .form-label { font-size: 0.8rem; fw-bold; color: #666; margin-bottom: 4px; text-transform: uppercase; }
        .form-control-lg { 
            border-radius: 15px; font-size: 1.5rem; font-weight: 700; 
            text-align: center; border: 2px solid #eee; 
        }
        .input-group-text { border-radius: 15px; border: 2px solid #eee; border-left: none; font-weight: bold; }
        
        .result-box {
            border-radius: 20px; background: #f0f7ff; border: 1px solid #c2d9ff;
            padding: 15px; margin-top: 20px; text-align: center;
        }
        .footer-custom {
            padding: 12px; background: #f8f9fa; border-top: 1px solid #eee;
            text-align: center; color: #adb5bd; font-size: 0.8rem; flex-shrink: 0;
        }
        .reset-btn { color: #dc3545; font-size: 0.8rem; text-decoration: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="card-header-custom">
        <h5 class="mb-0">⏱️ Kalkulator Waktu</h5>
        <div id="realtimeClock" class="fw-bold opacity-90" style="font-size: 1rem;"></div>
    </div>

    <div class="nav-pills-custom">
        <ul class="nav nav-pills nav-fill" id="pills-tab" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-selisih">Selisih</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-tambah">Tambah</button>
            </li>
        </ul>
    </div>

    <div class="card-body-content">
        <div class="tab-content">
            <div class="tab-pane fade show active" id="tab-selisih">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="btn-group btn-group-sm">
                        <button id="btn24" class="btn btn-primary" onclick="setFormat(24)">24H</button>
                        <button id="btn12" class="btn btn-outline-primary" onclick="setFormat(12)">12H</button>
                    </div>
                    <span class="reset-btn" onclick="resetAll()">🔄 Reset Jam</span>
                </div>

                <div class="mb-3">
                    <label class="form-label">Waktu Mulai</label>
                    <div class="input-group">
                        <input type="text" id="mulai" class="form-control form-control-lg t-input" placeholder="00:00" maxlength="5">
                        <span class="input-group-text d-none ampm-toggle" id="ampmMulai" onclick="toggleAMPM(this)">AM</span>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Waktu Selesai</label>
                    <div class="input-group">
                        <input type="text" id="selesai" class="form-control form-control-lg t-input" placeholder="00:00" maxlength="5">
                        <span class="input-group-text d-none ampm-toggle" id="ampmSelesai" onclick="toggleAMPM(this)">AM</span>
                    </div>
                </div>

                <div class="result-box">
                    <small class="text-muted d-block">DURASI HASIL</small>
                    <h3 id="resSelisih" class="text-primary mb-0 fw-bold">0 Jam 0 Menit</h3>
                </div>
            </div>

            <div class="tab-pane fade" id="tab-tambah">
                <div class="d-flex justify-content-end mb-3">
                    <span class="reset-btn" onclick="resetAll()">🔄 Reset Jam</span>
                </div>

                <div class="mb-3">
                    <label class="form-label">Dari Jam</label>
                    <div class="input-group">
                        <input type="text" id="awalTambah" class="form-control form-control-lg t-input" maxlength="5">
                        <span class="input-group-text d-none ampm-toggle" id="ampmTambah" onclick="toggleAMPM(this)">AM</span>
                    </div>
                </div>

                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label">Tambah Jam</label>
                        <input type="number" id="pJam" class="form-control form-control-lg num-input" value="0">
                    </div>
                    <div class="col-6">
                        <label class="form-label">Menit</label>
                        <input type="number" id="pMenit" class="form-control form-control-lg num-input" value="30">
                    </div>
                </div>

                <div class="result-box" style="background: #f0fff4; border-color: #b1e7c1;">
                    <small class="text-muted d-block">ESTIMASI WAKTU</small>
                    <h3 id="resTambah" class="text-success mb-0 fw-bold">--:--</h3>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-custom">
        Williyanto Adi &copy; 2026
    </div>
</div>

<script>
    let currentFormat = 24;

    function updateClock() {
        const now = new Date();
        document.getElementById('realtimeClock').innerText = now.toLocaleTimeString('id-ID', {hour12: false});
    }

    function toggleAMPM(el) {
        el.innerText = el.innerText === 'AM' ? 'PM' : 'AM';
        hitungSemua();
    }

    function setFormat(f) {
        currentFormat = f;
        const ampmEls = document.querySelectorAll('.ampm-toggle');
        if(f === 12) {
            ampmEls.forEach(el => el.classList.remove('d-none'));
            document.getElementById('btn12').className = 'btn btn-primary';
            document.getElementById('btn24').className = 'btn btn-outline-primary';
        } else {
            ampmEls.forEach(el => el.classList.add('d-none'));
            document.getElementById('btn24').className = 'btn btn-primary';
            document.getElementById('btn12').className = 'btn btn-outline-primary';
        }
        hitungSemua();
    }

    function resetAll() {
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        const time = `${hh}:${mm}`;
        
        document.getElementById('mulai').value = time;
        document.getElementById('selesai').value = "";
        document.getElementById('awalTambah').value = time;
        document.getElementById('pJam').value = 0;
        document.getElementById('pMenit').value = 30;
        
        const ampm = now.getHours() >= 12 ? 'PM' : 'AM';
        document.querySelectorAll('.ampm-toggle').forEach(el => el.innerText = ampm);
        
        hitungSemua();
    }

    function getMins(id, ampmId) {
        const val = document.getElementById(id).value.replace(/\D/g, '');
        if (val.length < 1) return null;
        let h, m;
        if (val.length <= 2) { h = parseInt(val); m = 0; }
        else { h = parseInt(val.slice(0, -2)); m = parseInt(val.slice(-2)); }
        
        if (currentFormat === 12) {
            const ampm = document.getElementById(ampmId).innerText;
            if (ampm === 'PM' && h < 12) h += 12;
            if (ampm === 'AM' && h === 12) h = 0;
        }
        return (h * 60) + m;
    }

    function hitungSemua() {
        // Logika Selisih
        const m1 = getMins('mulai', 'ampmMulai');
        const m2 = getMins('selesai', 'ampmSelesai');
        if (m1 !== null && m2 !== null) {
            let d = m2 - m1;
            if (d < 0) d += 1440;
            document.getElementById('resSelisih').innerText = `${Math.floor(d/60)} Jam ${d%60} Menit`;
        } else { document.getElementById('resSelisih').innerText = "0 Jam 0 Menit"; }

        // Logika Tambah
        const m3 = getMins('awalTambah', 'ampmTambah');
        const plusH = parseInt(document.getElementById('pJam').value) || 0;
        const plusM = parseInt(document.getElementById('pMenit').value) || 0;
        if (m3 !== null) {
            let total = (m3 + (plusH * 60) + plusM) % 1440;
            let rh = Math.floor(total/60);
            let rm = String(total%60).padStart(2, '0');
            
            if (currentFormat === 12) {
                let ap = rh >= 12 ? 'PM' : 'AM';
                let h12 = rh % 12 || 12;
                document.getElementById('resTambah').innerText = `${h12}:${rm} ${ap}`;
            } else {
                document.getElementById('resTambah').innerText = `${String(rh).padStart(2, '0')}:${rm}`;
            }
        }
    }

    // Input Format Logic
    document.querySelectorAll('.t-input').forEach(el => {
        el.addEventListener('input', e => {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 4) v = v.slice(0, 4);
            if (v.length >= 3) v = v.slice(0, -2) + ":" + v.slice(-2);
            e.target.value = v;
            hitungSemua();
        });
    });

    document.querySelectorAll('.num-input').forEach(el => {
        el.addEventListener('input', hitungSemua);
    });

    window.onload = () => {
        updateClock();
        setInterval(updateClock, 1000);
        resetAll();
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
