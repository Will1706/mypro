<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalkulator Waktu & Tanggal Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4361ee; --secondary: #3f37c9; --bg: #f1f5f9; }
        
        body, html { height: 100%; margin: 0; overflow: hidden; background-color: var(--bg); font-family: 'Inter', sans-serif; }
        body { display: flex; justify-content: center; align-items: center; padding: 10px; }

        .main-card {
            width: 100%; max-width: 420px; height: 95vh; max-height: 800px;
            background: #fff; border-radius: 30px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            display: flex; flex-direction: column; overflow: hidden;
        }

        .card-header-custom {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; padding: 15px; text-align: center; flex-shrink: 0;
        }

        .clock-badge { background: rgba(255, 255, 255, 0.2); padding: 2px 12px; border-radius: 12px; font-size: 0.8rem; margin-top: 5px; display: inline-block; }

        .nav-pills-custom { padding: 8px; background: #fff; border-bottom: 1px solid #f1f5f9; flex-shrink: 0; }
        .nav-pills .nav-link { font-weight: 600; color: #94a3b8; border-radius: 10px; font-size: 0.75rem; padding: 8px 5px; }
        .nav-pills .nav-link.active { background-color: var(--primary); }

        .card-body-content { padding: 15px 20px; flex-grow: 1; overflow-y: auto; scrollbar-width: none; }
        .card-body-content::-webkit-scrollbar { display: none; }

        .form-label { font-size: 0.65rem; font-weight: 700; color: #64748b; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

        .input-group-custom { 
            background: #f8fafc; 
            border-radius: 12px; 
            padding: 8px; 
            border: 2px solid #e2e8f0; 
            transition: 0.3s; 
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            height: 50px; /* Menyeragamkan tinggi kotak */
        }
        .input-group-custom:focus-within { border-color: var(--primary); background: #fff; }

        /* CSS UNTUK MENYERAGAMKAN FONT INPUT */
        .form-control-pro { 
            background: transparent; 
            border: none; 
            font-size: 1rem; /* Ukuran font seragam */
            font-weight: 700; 
            text-align: center; 
            color: #1e293b; 
            width: 100%; 
            font-family: 'Inter', sans-serif;
            appearance: none;
            -webkit-appearance: none;
        }
        .form-control-pro:focus { box-shadow: none; outline: none; }
        
        /* Font khusus untuk tab durasi yang berisi angka besar */
        .big-input { font-size: 1.4rem !important; }

        .result-box { border-radius: 20px; background: linear-gradient(135deg, #eff6ff, #dbeafe); border: 1px solid #bfdbfe; padding: 15px; margin-top: 5px; }

        .footer-custom { padding: 10px; background: #fff; text-align: center; color: #94a3b8; font-size: 0.7rem; border-top: 1px solid #f1f5f9; flex-shrink: 0; }

        .reset-btn { color: #ef4444; font-size: 0.75rem; font-weight: 700; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="card-header-custom">
        <h6 class="mb-0 fw-bold">⏱️ Kalkulator Waktu & Tanggal</h6>
        <div class="clock-badge"><span id="realtimeClock">00:00:00</span></div>
    </div>

    <div class="nav-pills-custom">
        <ul class="nav nav-pills nav-fill" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-selisih">Durasi</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-tambah">Tambah</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-tanggal">Tanggal</button></li>
        </ul>
    </div>

    <div class="card-body-content">
        <div class="tab-content">
            <div class="tab-pane fade show active" id="tab-selisih">
                <div class="d-flex justify-content-end mb-3"><a class="reset-btn" onclick="resetAll()">🔄 Reset</a></div>
                <label class="form-label">Waktu Mulai</label>
                <div class="input-group-custom"><input type="text" id="mulai" class="form-control-pro big-input t-input" placeholder="00:00" maxlength="5"></div>
                <label class="form-label">Waktu Selesai</label>
                <div class="input-group-custom"><input type="text" id="selesai" class="form-control-pro big-input t-input" placeholder="00:00" maxlength="5"></div>
                <div class="result-box text-center">
                    <small style="color: var(--primary); font-weight: 800; font-size: 0.6rem;">HASIL DURASI</small>
                    <h4 id="resSelisih" class="mb-0 fw-bold text-primary">0 Jam 0 Menit</h4>
                </div>
            </div>

            <div class="tab-pane fade" id="tab-tambah">
                <div class="d-flex justify-content-end mb-3"><a class="reset-btn" onclick="resetAll()">🔄 Reset</a></div>
                <label class="form-label">Waktu Awal</label>
                <div class="input-group-custom"><input type="text" id="awalTambah" class="form-control-pro big-input t-input" maxlength="5"></div>
                <div class="row g-2">
                    <div class="col-6"><label class="form-label">Jam</label><div class="input-group-custom"><input type="number" id="pJam" class="form-control-pro big-input num-input" value="0"></div></div>
                    <div class="col-6"><label class="form-label">Menit</label><div class="input-group-custom"><input type="number" id="pMenit" class="form-control-pro big-input num-input" value="30"></div></div>
                </div>
                <div class="result-box text-center" style="background: #f0fdf4; border-color: #bbf7d0;">
                    <small style="color: #16a34a; font-weight: 800; font-size: 0.6rem;">ESTIMASI SELESAI</small>
                    <h4 id="resTambah" class="mb-0 fw-bold text-success">--:--</h4>
                </div>
            </div>

            <div class="tab-pane fade" id="tab-tanggal">
                <div class="d-flex justify-content-end mb-2"><a class="reset-btn" onclick="resetDateFields()">🔄 Reset</a></div>
                
                <div class="row g-2 mb-1">
                    <div class="col-6">
                        <label class="form-label">Tanggal Mulai</label>
                        <div class="input-group-custom"><input type="date" id="startDate" class="form-control-pro"></div>
                    </div>
                    <div class="col-6">
                        <label class="form-label">Tanggal Selesai</label>
                        <div class="input-group-custom"><input type="date" id="endDate" class="form-control-pro"></div>
                    </div>
                </div>

                <div class="row g-2 mb-2">
                    <div class="col-6">
                        <label class="form-label">Waktu Mulai</label>
                        <div class="input-group-custom"><input type="time" id="startTime" class="form-control-pro"></div>
                    </div>
                    <div class="col-6">
                        <label class="form-label">Waktu Selesai</label>
                        <div class="input-group-custom"><input type="time" id="endTime" class="form-control-pro"></div>
                    </div>
                </div>

                <div class="result-box text-center" style="background: linear-gradient(135deg, #fff7ed, #ffedd5); border-color: #fed7aa;">
                    <small style="color: #ea580c; font-weight: 800; font-size: 0.6rem;">HASIL PERHITUNGAN JARAK</small>
                    <h5 id="resDate" class="mb-0 fw-bold" style="color: #9a3412; font-size: 1.1rem;">0 Hari, 0 Jam, 0 Menit</h5>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-custom">&copy; 2026 • Williyanto Adi</div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        document.getElementById('realtimeClock').innerText = now.toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit', second:'2-digit', hour12: false});
    }

    function resetAll() {
        const now = new Date();
        const time = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        document.getElementById('mulai').value = time;
        document.getElementById('selesai').value = "";
        document.getElementById('awalTambah').value = time;
        document.getElementById('pJam').value = 0;
        document.getElementById('pMenit').value = 30;
        hitungSemua();
    }

    function resetDateFields() {
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        const hh = String(now.getHours()).padStart(2, '0');
        const min = String(now.getMinutes()).padStart(2, '0');

        document.getElementById('startDate').value = `${yyyy}-${mm}-${dd}`;
        document.getElementById('endDate').value = `${yyyy}-${mm}-${dd}`;
        document.getElementById('startTime').value = `${hh}:${min}`;
        document.getElementById('endTime').value = `${hh}:${min}`;
        hitungTanggal();
    }

    function hitungSemua() {
        const v1 = document.getElementById('mulai').value.replace(/\D/g, '');
        const v2 = document.getElementById('selesai').value.replace(/\D/g, '');
        if (v1.length >= 3 && v2.length >= 3) {
            let m1 = parseInt(v1.slice(0, -2))*60 + parseInt(v1.slice(-2));
            let m2 = parseInt(v2.slice(0, -2))*60 + parseInt(v2.slice(-2));
            let d = m2 - m1; if (d < 0) d += 1440;
            document.getElementById('resSelisih').innerText = `${Math.floor(d/60)} Jam ${d%60} Menit`;
        }
        const v3 = document.getElementById('awalTambah').value.replace(/\D/g, '');
        if (v3.length >= 3) {
            let total = (parseInt(v3.slice(0, -2))*60 + parseInt(v3.slice(-2)) + (parseInt(document.getElementById('pJam').value)||0)*60 + (parseInt(document.getElementById('pMenit').value)||0)) % 1440;
            let rh = Math.floor(total/60), rm = String(total%60).padStart(2, '0');
            document.getElementById('resTambah').innerText = `${String(rh).padStart(2, '0')}:${rm}`;
        }
    }

    function hitungTanggal() {
        const d1 = document.getElementById('startDate').value;
        const t1 = document.getElementById('startTime').value;
        const d2 = document.getElementById('endDate').value;
        const t2 = document.getElementById('endTime').value;
        if (d1 && t1 && d2 && t2) {
            const start = new Date(`${d1}T${t1}`);
            const end = new Date(`${d2}T${t2}`);
            let diffMs = end - start;
            if (diffMs < 0) {
                document.getElementById('resDate').innerText = "Waktu selesai harus setelah mulai";
                return;
            }
            let diffDays = Math.floor(diffMs / 86400000);
            let diffHrs = Math.floor((diffMs % 86400000) / 3600000);
            let diffMins = Math.floor((diffMs % 3600000) / 60000);
            document.getElementById('resDate').innerText = `${diffDays} Hari, ${diffHrs} Jam, ${diffMins} Menit`;
        }
    }

    document.querySelectorAll('.t-input').forEach(el => {
        el.addEventListener('input', e => {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 4) v = v.slice(0, 4);
            if (v.length >= 3) v = v.slice(0, -2) + ":" + v.slice(-2);
            e.target.value = v; hitungSemua();
        });
    });

    document.querySelectorAll('.num-input').forEach(el => el.addEventListener('input', hitungSemua));
    ['startDate', 'startTime', 'endDate', 'endTime'].forEach(id => {
        document.getElementById(id).addEventListener('change', hitungTanggal);
    });

    window.onload = () => { updateClock(); setInterval(updateClock, 1000); resetAll(); resetDateFields(); };
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
