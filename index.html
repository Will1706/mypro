<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunia Angka Anak Pintar</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { --primary-color: #ff7f50; --secondary-color: #6c5ce7; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            overflow-x: hidden;
        }

        .main-wrapper { flex: 1; display: flex; align-items: center; padding: 20px 0; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            padding: 40px;
            border: 8px solid white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }

        .title-font { font-family: 'Fredoka One', cursive; color: var(--primary-color); }

        .mode-card {
            cursor: pointer;
            transition: 0.3s;
            border-radius: 25px;
            padding: 30px;
            background: #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 4px solid transparent;
        }

        .mode-card:hover { transform: translateY(-10px); border-color: var(--primary-color); }

        .number-btn {
            width: 75px;
            height: 75px;
            border-radius: 20px;
            border: none;
            color: white;
            font-family: 'Fredoka One', cursive;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 6px 0px rgba(0,0,0,0.15);
            user-select: none;
        }

        .number-btn:active { transform: translateY(4px); box-shadow: none; filter: brightness(0.9); }

        /* Warna Tombol */
        .btn-1 { background: #ff4757; } .btn-2 { background: #2ed573; }
        .btn-3 { background: #1e90ff; } .btn-4 { background: #ffa502; }
        .btn-5 { background: #3742fa; } .btn-6 { background: #ff6b81; }
        .btn-7 { background: #70a1ff; } .btn-8 { background: #7bed9f; }
        .btn-9 { background: #5352ed; } .btn-10 { background: #eccc68; }

        .hidden { display: none !important; }

        #output-text {
            font-family: 'Fredoka One', cursive;
            font-size: 2.5rem;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
        }

        footer {
            padding: 15px;
            text-align: center;
            font-weight: bold;
            color: #555;
            background: rgba(255,255,255,0.5);
            margin-top: auto;
        }

        .streak-info { font-size: 0.85rem; color: #666; font-weight: 600; margin-top: 5px; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="container" style="max-width: 850px;">
        <div class="glass-card text-center animate__animated animate__fadeIn">
            
            <div id="main-menu">
                <h1 class="title-font display-4 mb-2">Halo Anak Pintar!</h1>
                <p class="text-muted mb-5 fs-5">Pilih mode untuk mulai bermain:</p>
                <div class="row g-4">
                    <div class="col-md-6" onclick="switchMode('belajar')">
                        <div class="mode-card shadow-sm h-100">
                            <div class="display-3 mb-2">📖</div>
                            <h3 class="title-font">Mode Belajar</h3>
                        </div>
                    </div>
                    <div class="col-md-6" onclick="switchMode('tebak')">
                        <div class="mode-card shadow-sm h-100">
                            <div class="display-3 mb-2">🎯</div>
                            <h3 class="title-font">Tebak Angka</h3>
                        </div>
                    </div>
                </div>
            </div>

            <div id="game-area" class="hidden">
                <div class="d-flex justify-content-between align-items-start mb-4">
                    <button class="btn btn-outline-secondary rounded-pill fw-bold shadow-sm" onclick="goHome()">🏠 Menu</button>
                    <div id="score-container" class="hidden text-end">
                        <span class="badge bg-primary rounded-pill p-2 px-4 fs-6 shadow-sm">Skor: <span id="skor">0</span></span>
                        <div class="streak-info">Beruntun: <span id="streak-count">0</span> | Gagal: <span id="fail-count">0</span></div>
                    </div>
                </div>

                <div id="display-screen" class="p-4 mb-5 bg-white rounded-4 border border-4 shadow-sm">
                    <div id="output-text" class="animate__animated text-primary text-center">Ayo mulai!</div>
                </div>

                <div id="button-grid" class="d-flex flex-wrap justify-content-center gap-3">
                    <script>
                        for(let i=1; i<=10; i++) {
                            document.write(`<button class="number-btn btn-${i}" onclick="handleNumberClick(${i})">${i}</button>`);
                        }
                    </script>
                </div>
            </div>
        </div>
    </div>
</div>

<footer>Mainan Edukasi by : Williyanto Adi 2026</footer>

<script>
    let currentMode = '';
    let targetAngka = 0;
    let skor = 0;
    let streak = 0;
    let failStreak = 0;
    let audioAktif = null;
    let isProcessing = false;

    // FUNGSI SELEBRASI KEMBANG API
    function jalankanKembangApi() {
        // Ledakan tengah
        confetti({
            particleCount: 150,
            spread: 70,
            origin: { y: 0.6 },
            zIndex: 999
        });

        // Kembang api samping menerus selama 2 detik
        var end = Date.now() + (2 * 1000);
        (function frame() {
            confetti({ particleCount: 2, angle: 60, spread: 55, origin: { x: 0 }, zIndex: 999 });
            confetti({ particleCount: 2, angle: 120, spread: 55, origin: { x: 1 }, zIndex: 999 });
            if (Date.now() < end) { requestAnimationFrame(frame); }
        }());
    }

    async function putarAudio(namaFile) {
        if (audioAktif) { audioAktif.pause(); audioAktif.currentTime = 0; }
        return new Promise((resolve) => {
            audioAktif = new Audio(`audio/${namaFile}.mp3`);
            audioAktif.onended = resolve;
            audioAktif.onerror = resolve; // Jika file tidak ada, tidak macet
            audioAktif.play().catch(e => resolve());
        });
    }

    function switchMode(mode) {
        currentMode = mode;
        isProcessing = false;
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('game-area').classList.remove('hidden');
        
        if (mode === 'belajar') {
            document.getElementById('score-container').classList.add('hidden');
            document.getElementById('output-text').innerText = "Klik angka di bawah!";
            putarAudio('belajar_pilih');
        } else {
            skor = 0; streak = 0; failStreak = 0;
            updateDisplayScore();
            document.getElementById('score-container').classList.remove('hidden');
            putarAudio('tebak_mulai');
            setTimeout(buatPertanyaanBaru, 2200);
        }
    }

    function updateDisplayScore() {
        document.getElementById('skor').innerText = skor;
        document.getElementById('streak-count').innerText = streak;
        document.getElementById('fail-count').innerText = failStreak;
    }

    async function handleNumberClick(n) {
        if (isProcessing) return;
        const el = document.getElementById('output-text');
        
        if (currentMode === 'belajar') {
            el.innerHTML = `Ini Angka <span class="text-danger">${n}</span>`;
            el.className = "animate__animated animate__bounceIn text-primary";
            putarAudio(n);
        } else {
            isProcessing = true;
            if (n === targetAngka) {
                // JAWABAN BENAR
                skor += 10;
                streak++;
                failStreak = 0;
                updateDisplayScore();
                el.innerHTML = "Yeyy! Kamu Benar! 🎉";
                el.className = "animate__animated animate__tada text-success";
                
                if (streak >= 3) {
                    jalankanKembangApi(); // Langsung muncul kembang api
                    const randomBonus = Math.floor(Math.random() * 3) + 1;
                    await putarAudio(`bonus${randomBonus}`);
                    streak = 0;
                    updateDisplayScore();
                } else {
                    await putarAudio('benar');
                }
                setTimeout(() => { isProcessing = false; buatPertanyaanBaru(); }, 1000);
            } else {
                // JAWABAN SALAH
                failStreak++;
                streak = 0;
                updateDisplayScore();
                if ("vibrate" in navigator) navigator.vibrate(200);
                
                el.innerHTML = "Oow! Salah, <br>ayo coba lagi! ⛔";
                el.className = "animate__animated animate__shakeX text-danger";
                
                if (failStreak >= 3) {
                    await putarAudio('semangat');
                    failStreak = 0;
                    updateDisplayScore();
                } else {
                    await putarAudio('salah');
                }
                setTimeout(() => { isProcessing = false; ulangiPertanyaan(); }, 1000);
            }
        }
    }

    function buatPertanyaanBaru() {
        if (currentMode !== 'tebak') return;
        targetAngka = Math.floor(Math.random() * 10) + 1;
        ulangiPertanyaan();
    }

    async function ulangiPertanyaan() {
        if (currentMode !== 'tebak') return;
        const el = document.getElementById('output-text');
        el.innerText = `Mana angka ${targetAngka}?`;
        el.className = "animate__animated animate__pulse animate__infinite text-dark";
        
        await putarAudio('cari_angka');
        setTimeout(() => {
            if (currentMode === 'tebak') putarAudio(targetAngka);
        }, 400); 
    }

    function goHome() {
        currentMode = '';
        isProcessing = false;
        document.getElementById('main-menu').classList.remove('hidden');
        document.getElementById('game-area').classList.add('hidden');
        if (audioAktif) { audioAktif.pause(); audioAktif = null; }
    }
</script>

</body>
</html>
