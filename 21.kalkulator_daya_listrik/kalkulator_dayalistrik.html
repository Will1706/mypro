<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha344-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <title>Kalkulator Biaya Listrik Otomatis</title>
    
    <style>
        body { 
            background-color: #f8f9fa;
        }
        .card-header { background-color: #0d6efd; color: white; }
        .btn-remove { color: #dc3545; }
        .btn-remove:hover { color: #a71d2a; }
        footer {
            color: #6c757d;
        }
        .cost-col {
             min-width: 120px;
        }

        /* CSS untuk mengubah tabel menjadi format kartu di mobile */
        @media (max-width: 767.98px) {
            .table-responsive thead {
                display: none; /* Sembunyikan header tabel di mobile */
            }
            .table-responsive tbody,
            .table-responsive tr,
            .table-responsive td {
                display: block;
                width: 100%;
            }
            .table-responsive tr {
                margin-bottom: 1rem;
                border: 1px solid #dee2e6;
                border-radius: 0.375rem;
                padding: 1rem;
            }
            .table-responsive td {
                display: flex;
                justify-content: space-between; /* Membuat label dan nilai berseberangan */
                align-items: center;
                border: none;
                padding: 0.5rem 0;
            }
            .table-responsive td::before {
                content: attr(data-label); /* Mengambil teks label dari atribut data-label */
                font-weight: bold;
                margin-right: 1rem;
            }
            /* Styling khusus untuk sel pertama (Nama Alat) sebagai judul kartu */
            .table-responsive td:first-of-type {
                font-size: 1.2rem;
                font-weight: bold;
                margin-bottom: 0.5rem;
                justify-content: flex-start; /* Ratakan ke kiri */
            }
            .table-responsive td:first-of-type::before {
                content: ""; /* Hilangkan label untuk judul kartu */
            }
            /* Styling khusus untuk tombol aksi */
            .table-responsive td:last-of-type {
                justify-content: flex-end; /* Ratakan tombol hapus ke kanan */
                padding-top: 0.5rem;
            }
             .table-responsive td:last-of-type::before {
                content: ""; /* Hilangkan label untuk tombol aksi */
            }
        }
    </style>
</head>
<body>

    <div class="container mt-4 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <div class="card shadow-sm">
                    <div class="card-header text-center">
                        <h1 class="h3 mb-0"><i class="bi bi-lightning-charge-fill me-2"></i>Kalkulator Estimasi Biaya Listrik</h1>
                    </div>
                    <div class="card-body">
                        
                        <h2 class="h5 border-bottom pb-2 mb-3">1. Tambah Alat Elektronik</h2>
                        <form id="form-alat">
                            <div class="row g-3">
                                <div class="col-md-12">
                                    <label for="nama-alat" class="form-label">Nama Alat</label>
                                    <input type="text" class="form-control" id="nama-alat" placeholder="Contoh: TV, Kulkas, AC" required>
                                </div>
                                <div class="col-6">
                                    <label for="daya" class="form-label">Daya (Watt)</label>
                                    <input type="number" class="form-control" id="daya" placeholder="Contoh: 100" required>
                                </div>
                                <div class="col-6">
                                    <label for="durasi" class="form-label">Durasi (Jam/Hari)</label>
                                    <input type="number" class="form-control" id="durasi" placeholder="Contoh: 8" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mt-3"><i class="bi bi-plus-circle me-2"></i>Tambahkan ke Daftar</button>
                        </form>

                        <hr class="my-4">

                        <h2 class="h5 border-bottom pb-2 mb-3">2. Daftar Alat & Rincian Biaya</h2>
                        <div class="table-responsive">
                            <table class="table table-striped table-hover">
                                <thead>
                                    <tr>
                                        <th scope="col">Nama Alat</th>
                                        <th scope="col" class="text-end">Daya (W)</th>
                                        <th scope="col" class="text-end">Durasi (Jam)</th>
                                        <th scope="col" class="text-end cost-col">Est. Biaya / Bulan</th>
                                        <th scope="col" class="text-center">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody id="daftar-alat">
                                    <tr>
                                        <td colspan="5" class="text-center text-muted">Belum ada alat yang ditambahkan.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <hr class="my-4">

                        <h2 class="h5 border-bottom pb-2 mb-3">3. Kalkulasi & Aksi</h2>
                        <div class="row g-3 align-items-end">
                             <div class="col-md-6">
                                <label for="tarif" class="form-label">Tarif Listrik per kWh (Rp)</label>
                                <div class="input-group">
                                    <span class="input-group-text">Rp</span>
                                    <input type="number" class="form-control" id="tarif" value="1445" placeholder="Contoh: 1445">
                                </div>
                            </div>
                             <div class="col-md-6">
                                <label for="periode-hitung" class="form-label">Pilih Periode Total</label>
                                <select class="form-select" id="periode-hitung">
                                    <option value="harian">Harian</option>
                                    <option value="mingguan">Mingguan</option>
                                    <option value="bulanan" selected>Bulanan (30 Hari)</option>
                                    <option value="tahunan">Tahunan (365 Hari)</option>
                                </select>
                             </div>
                        </div>
                        <button id="hitung-biaya" class="btn btn-success w-100 mt-3"><i class="bi bi-calculator-fill me-2"></i>Hitung Ulang Manual</button>
                       
                        <div class="d-flex justify-content-between mt-3">
                            <button class="btn btn-secondary" onclick="history.back()">Kembali</button>
                            <button class="btn btn-danger" id="tombol-hapus-semua">Hapus</button>
                            <a href="index.html" class="btn btn-secondary">Beranda</a>
                        </div>

                        <div id="hasil-kalkulasi" class="mt-4" style="display: none;">
                            </div>

                    </div>
                </div>
            </div>
        </div>

        <footer class="text-center py-3 mt-4">
            Williyanto Adi 2025
        </footer>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
        const formAlat = document.getElementById('form-alat');
        const daftarAlatBody = document.getElementById('daftar-alat');
        const tombolHitung = document.getElementById('hitung-biaya');
        const hasilDiv = document.getElementById('hasil-kalkulasi');
        const tarifInput = document.getElementById('tarif');
        const periodeSelect = document.getElementById('periode-hitung');
        const tombolHapusSemua = document.getElementById('tombol-hapus-semua');
        const formatRupiah = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 });

        function cekTabelKosong() {
            const placeholder = daftarAlatBody.querySelector('td[colspan="5"]');
            if (placeholder) {
                daftarAlatBody.innerHTML = '';
            } else if (daftarAlatBody.children.length === 0) {
                 daftarAlatBody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">Belum ada alat yang ditambahkan.</td></tr>';
            }
        }

        function calculateAndDisplay() {
            const tarifPerKwh = parseFloat(tarifInput.value);
            const periode = periodeSelect.value;
            const barisAlat = daftarAlatBody.getElementsByTagName('tr');
            let totalKwhHarian = 0;

            if (barisAlat.length === 0 || daftarAlatBody.querySelector('td[colspan="5"]') || isNaN(tarifPerKwh) || tarifPerKwh <= 0){
                hasilDiv.style.display = 'none';
                 for (let i = 0; i < barisAlat.length; i++) {
                    if (barisAlat[i].querySelector('.biaya-alat')) {
                       barisAlat[i].querySelector('.biaya-alat').textContent = formatRupiah.format(0);
                    }
                 }
                return;
            }
            
            for (let i = 0; i < barisAlat.length; i++) {
                const sel = barisAlat[i].getElementsByTagName('td');
                const daya = parseFloat(sel[1].getAttribute('data-daya'));
                const durasi = parseFloat(sel[2].getAttribute('data-durasi'));
                
                const kwhHarianAlat = (daya * durasi) / 1000;
                totalKwhHarian += kwhHarianAlat;
                
                const biayaBulananAlat = kwhHarianAlat * 30 * tarifPerKwh;
                
                barisAlat[i].querySelector('.biaya-alat').textContent = formatRupiah.format(biayaBulananAlat);
            }
            
            let multiplier = 1, namaPeriode = 'satu hari', labelPeriode = 'Harian';
            switch (periode) {
                case 'mingguan': multiplier = 7; namaPeriode = 'satu minggu'; labelPeriode = 'Mingguan'; break;
                case 'bulanan': multiplier = 30; namaPeriode = 'satu bulan'; labelPeriode = 'Bulanan (30 hari)'; break;
                case 'tahunan': multiplier = 365; namaPeriode = 'satu tahun'; labelPeriode = 'Tahunan (365 hari)'; break;
            }

            const totalKwhPeriode = totalKwhHarian * multiplier;
            const totalBiaya = totalKwhPeriode * tarifPerKwh;

            hasilDiv.style.display = 'block';
            hasilDiv.innerHTML = `
                <div class="alert alert-success">
                    <h4 class="alert-heading">Estimasi Total Biaya Anda</h4>
                    <p>Total pemakaian harian: <strong>${totalKwhHarian.toFixed(2)} kWh</strong><br>Total pemakaian ${labelPeriode}: <strong>${totalKwhPeriode.toFixed(2)} kWh</strong></p><hr>
                    <p class="mb-0 fs-5">Estimasi total biaya untuk ${namaPeriode} adalah: <strong>${formatRupiah.format(totalBiaya)}</strong></p>
                </div>
            `;
        }
        
        function hapusSemuaData() {
            daftarAlatBody.innerHTML = '';
            cekTabelKosong();
            calculateAndDisplay();
        }

        // ## PERUBAHAN DI SINI: JAVASCRIPT ##
        formAlat.addEventListener('submit', function(event) {
            event.preventDefault();
            cekTabelKosong();
            const barisBaru = document.createElement('tr');
            // Tambahkan atribut data-label pada setiap <td> untuk digunakan oleh CSS di mobile
            barisBaru.innerHTML = `
                <td data-label="Nama Alat">${document.getElementById('nama-alat').value}</td>
                <td data-label="Daya (W)" class="text-end" data-daya="${document.getElementById('daya').value}">${document.getElementById('daya').value} W</td>
                <td data-label="Durasi (Jam)" class="text-end" data-durasi="${document.getElementById('durasi').value}">${document.getElementById('durasi').value} jam</td>
                <td data-label="Est. Biaya / Bulan" class="text-end biaya-alat">${formatRupiah.format(0)}</td>
                <td data-label="Aksi" class="text-center"><button class="btn btn-sm btn-remove" title="Hapus"><i class="bi bi-trash3-fill"></i></button></td>
            `;
            daftarAlatBody.appendChild(barisBaru);
            formAlat.reset();
            calculateAndDisplay();
        });
        // ## AKHIR PERUBAHAN ##

        daftarAlatBody.addEventListener('click', function(event) {
            if (event.target.closest('.btn-remove')) {
                event.target.closest('tr').remove();
                cekTabelKosong();
                calculateAndDisplay();
            }
        });

        tombolHitung.addEventListener('click', calculateAndDisplay);
        tarifInput.addEventListener('input', calculateAndDisplay);
        periodeSelect.addEventListener('change', calculateAndDisplay);
        tombolHapusSemua.addEventListener('click', hapusSemuaData);

    </script>
</body>
</html>
