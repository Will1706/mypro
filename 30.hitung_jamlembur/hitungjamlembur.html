<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Lembur Pro - Pemisah Ribuan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Inter', sans-serif; }
        .card-main { border: none; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; }
        .header-gradient { background: linear-gradient(135deg, #198754 0%, #0d6efd 100%); color: white; padding: 30px; }
        .result-card { background-color: #fff9db; border: 2px dashed #ffc107; border-radius: 15px; }
        .label-custom { font-weight: 600; color: #495057; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card card-main">
                <div class="header-gradient text-center">
                    <h3 class="fw-bold mb-1">Kalkulator Upah Lembur</h3>
                    <p class="mb-0 opacity-75">Format Otomatis Pemisah Ribuan</p>
                </div>
                
                <div class="card-body p-4 p-md-5">
                    <div class="row g-4">
                        <div class="col-md-6 border-end">
                            <h5 class="mb-4"><i class="bi bi-pencil-square me-2"></i>Data Input</h5>
                            
                            <div class="mb-3">
                                <label class="label-custom">Gaji Pokok</label>
                                <div class="input-group">
                                    <span class="input-group-text">Rp</span>
                                    <input type="text" id="gajiPokok" class="form-control fw-bold" value="6.000.000" oninput="handleGajiInput(this)">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="label-custom">Perkalian (Pembagi)</label>
                                <input type="number" id="perkalian" class="form-control" value="173" oninput="calculateAll()">
                            </div>

                            <div class="mb-3">
                                <label class="label-custom">Bulan Periode</label>
                                <select id="bulan" class="form-select" onchange="calculateAll()"></select>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <h5 class="mb-4"><i class="bi bi-clock-history me-2"></i>Konfigurasi Shift</h5>
                            
                            <div class="mb-4">
                                <label class="label-custom d-block mb-2">Pilih Durasi / Shift</label>
                                <div class="btn-group w-100" role="group">
                                    <input type="radio" class="btn-check" name="shift" id="s1" value="shift1" onchange="calculateAll()">
                                    <label class="btn btn-outline-primary" for="s1">Shift 1</label>

                                    <input type="radio" class="btn-check" name="shift" id="s2" value="shift2" onchange="calculateAll()">
                                    <label class="btn btn-outline-primary" for="s2">Shift 2</label>

                                    <input type="radio" class="btn-check" name="shift" id="s3" value="shift3" checked onchange="calculateAll()">
                                    <label class="btn btn-outline-primary" for="s3">Shift 3</label>
                                </div>
                            </div>

                            <div class="p-3 rounded bg-light border mb-3 text-center">
                                <span class="label-custom d-block mb-1">Upah per Jam (Rate):</span>
                                <h4 class="fw-bold text-success mb-0" id="upahPerJamDisplay">Rp0</h4>
                            </div>
                        </div>
                    </div>

                    <div class="result-card p-4 mt-5 text-center">
                        <p class="mb-2 text-secondary">Total Upah Lembur Periode <span id="textBulan" class="fw-bold text-dark">...</span>:</p>
                        <h1 class="display-4 fw-bold text-dark mb-0" id="totalUpah">Rp0</h1>
                        <div id="breakdownText" class="text-muted small mt-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const bulanNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
    
    window.onload = () => {
        const bulanSelect = document.getElementById('bulan');
        const currentMonth = new Date().getMonth();
        bulanNames.forEach((bulan, index) => {
            let option = new Option(bulan, bulan);
            if (index === currentMonth) option.selected = true;
            bulanSelect.add(option);
        });
        calculateAll();
    };

    // Fungsi memformat input angka dengan titik otomatis
    function handleGajiInput(input) {
        let value = input.value.replace(/[^0-9]/g, ""); // Hapus semua karakter kecuali angka
        if (value === "") value = "0";
        input.value = Number(value).toLocaleString('id-ID'); // Format ke ribuan titik
        calculateAll();
    }

    // Fungsi memformat angka murni ke Rupiah (6000000 -> 6.000.000)
    function formatRupiah(angka) {
        return "Rp" + Math.round(angka).toLocaleString('id-ID');
    }

    function calculateAll() {
        // Ambil value dari input, hapus titik agar bisa dihitung secara matematis
        const gajiStr = document.getElementById('gajiPokok').value.replace(/\./g, "");
        const gaji = parseFloat(gajiStr) || 0;
        const pengali = parseFloat(document.getElementById('perkalian').value) || 1;
        const bulan = document.getElementById('bulan').value;
        const shift = document.querySelector('input[name="shift"]:checked').value;
        
        const upahPerJam = gaji / pengali;

        document.getElementById('upahPerJamDisplay').innerText = formatRupiah(upahPerJam);
        document.getElementById('textBulan').innerText = bulan;

        let totalLembur = 0;
        let breakdown = "";

        // Logika Sesuai Instruksi Sebelumnya
        if (shift === 'shift1') {
            totalLembur = (7 * 2 * upahPerJam) + (0.5 * 3 * upahPerJam);
            breakdown = `(7 jam \u00d7 2) + (0.5 jam \u00d7 3)`;
        } else if (shift === 'shift2') {
            totalLembur = (1 * 1.5 * upahPerJam) + (7 * 2 * upahPerJam);
            breakdown = `(1 jam \u00d7 1.5) + (7 jam \u00d7 2)`;
        } else if (shift === 'shift3') {
            totalLembur = (7 * 2 * upahPerJam);
            breakdown = `7 jam \u00d7 2`;
        }

        document.getElementById('totalUpah').innerText = formatRupiah(totalLembur);
        document.getElementById('breakdownText').innerText = `Rincian Pengali: ${breakdown}`;
    }
</script>

</body>
</html>
