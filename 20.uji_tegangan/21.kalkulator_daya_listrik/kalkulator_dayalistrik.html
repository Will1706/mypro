<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <title>Kalkulator Biaya Listrik</title>
    
    <style>
        /* Sedikit style tambahan untuk tampilan yang lebih baik */
        body {
            background-color: #f8f9fa;
        }
        .card-header {
            background-color: #0d6efd;
            color: white;
        }
        .btn-remove {
            color: #dc3545; /* Warna merah untuk tombol hapus */
        }
        .btn-remove:hover {
            color: #a71d2a;
        }
    </style>
</head>
<body>

    <div class="container mt-4 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <div class="card shadow-sm">
                    <div class="card-header text-center">
                        <h1 class="h3 mb-0"><i class="bi bi-lightning-charge-fill me-2"></i>Kalkulator Estimasi Biaya Listrik</h1>
                    </div>
                    <div class="card-body">
                        
                        <h2 class="h5 border-bottom pb-2 mb-3">1. Tambah Alat Elektronik</h2>
                        <form id="form-alat">
                            <div class="row g-3">
                                <div class="col-md-12">
                                    <label for="nama-alat" class="form-label">Nama Alat</label>
                                    <input type="text" class="form-control" id="nama-alat" placeholder="Contoh: TV, Kulkas, AC" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="daya" class="form-label">Daya (Watt)</label>
                                    <input type="number" class="form-control" id="daya" placeholder="Contoh: 100" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="durasi" class="form-label">Durasi Pakai (Jam/Hari)</label>
                                    <input type="number" class="form-control" id="durasi" placeholder="Contoh: 8" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mt-3"><i class="bi bi-plus-circle me-2"></i>Tambahkan ke Daftar</button>
                        </form>

                        <hr class="my-4">

                        <h2 class="h5 border-bottom pb-2 mb-3">2. Daftar Alat & Pemakaian</h2>
                        <div class="table-responsive">
                            <table class="table table-striped table-hover">
                                <thead>
                                    <tr>
                                        <th scope="col">Nama Alat</th>
                                        <th scope="col" class="text-end">Daya (W)</th>
                                        <th scope="col" class="text-end">Durasi (Jam)</th>
                                        <th scope="col" class="text-center">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody id="daftar-alat">
                                    <tr>
                                        <td colspan="4" class="text-center text-muted">Belum ada alat yang ditambahkan.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <hr class="my-4">

                        <h2 class="h5 border-bottom pb-2 mb-3">3. Kalkulasi Total Biaya</h2>
                        <div class="row g-3 align-items-end">
                             <div class="col-md-12">
                                <label for="tarif" class="form-label">Tarif Listrik per kWh (Rupiah)</label>
                                <div class="input-group">
                                    <span class="input-group-text">Rp</span>
                                    <input type="number" class="form-control" id="tarif" value="1445" placeholder="Contoh: 1445">
                                </div>
                                <div class="form-text">
                                  Tarif umum non-subsidi biasanya sekitar Rp 1.444,70 per kWh. Sesuaikan jika berbeda.
                                </div>
                            </div>
                        </div>
                        <button id="hitung-biaya" class="btn btn-success w-100 mt-3"><i class="bi bi-calculator-fill me-2"></i>Hitung Total Biaya Bulanan</button>
                       
                        <div id="hasil-kalkulasi" class="mt-4" style="display: none;">
                            </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
        // --- MEMILIH ELEMEN PENTING DARI HTML ---
        const formAlat = document.getElementById('form-alat');
        const daftarAlatBody = document.getElementById('daftar-alat');
        const tombolHitung = document.getElementById('hitung-biaya');
        const hasilDiv = document.getElementById('hasil-kalkulasi');
        
        // Cek jika tabel kosong, tampilkan pesan awal
        function cekTabelKosong() {
            if (daftarAlatBody.children.length === 0) {
                daftarAlatBody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Belum ada alat yang ditambahkan.</td></tr>';
            } else if (daftarAlatBody.firstElementChild.children.length > 1 && daftarAlatBody.firstElementChild.children[0].getAttribute('colspan') === "4") {
                 daftarAlatBody.innerHTML = ''; // Hapus pesan jika sudah ada isinya
            }
        }

        // --- FUNGSI UNTUK MENAMBAHKAN ALAT KE TABEL ---
        formAlat.addEventListener('submit', function(event) {
            // Mencegah form mengirim data dan me-refresh halaman
            event.preventDefault();

            // Ambil nilai dari input form
            const nama = document.getElementById('nama-alat').value;
            const daya = document.getElementById('daya').value;
            const durasi = document.getElementById('durasi').value;

            // Hapus pesan "belum ada alat" jika ada
            cekTabelKosong();

            // Buat baris tabel (tr) baru
            const barisBaru = document.createElement('tr');
            barisBaru.innerHTML = `
                <td>${nama}</td>
                <td class="text-end" data-daya="${daya}">${daya} W</td>
                <td class="text-end" data-durasi="${durasi}">${durasi} jam</td>
                <td class="text-center">
                    <button class="btn btn-sm btn-remove" title="Hapus"><i class="bi bi-trash3-fill"></i></button>
                </td>
            `;

            // Tambahkan baris baru ke dalam tabel
            daftarAlatBody.appendChild(barisBaru);

            // Reset (kosongkan) form input
            formAlat.reset();
        });

        // --- FUNGSI UNTUK MENGHAPUS ALAT DARI TABEL ---
        daftarAlatBody.addEventListener('click', function(event) {
            // Cek apakah yang diklik adalah tombol hapus
            if (event.target.closest('.btn-remove')) {
                // Hapus baris (tr) dari tabel
                event.target.closest('tr').remove();
                cekTabelKosong(); // Cek lagi apakah tabel jadi kosong setelah dihapus
            }
        });

        // --- FUNGSI UNTUK MENGHITUNG TOTAL BIAYA ---
        tombolHitung.addEventListener('click', function() {
            const tarifPerKwh = parseFloat(document.getElementById('tarif').value);
            const barisAlat = daftarAlatBody.getElementsByTagName('tr');
            let totalKwhHarian = 0;

            // Validasi jika tarif kosong
            if (isNaN(tarifPerKwh) || tarifPerKwh <= 0) {
                alert('Silakan masukkan tarif listrik yang valid.');
                return;
            }

            // Validasi jika tidak ada alat di daftar
            if (barisAlat.length === 0 || (barisAlat.length === 1 && daftarAlatBody.firstElementChild.children[0].hasAttribute('colspan'))){
                alert('Silakan tambahkan minimal satu alat elektronik ke daftar.');
                return;
            }

            // Loop melalui setiap baris di tabel
            for (let i = 0; i < barisAlat.length; i++) {
                const sel = barisAlat[i].getElementsByTagName('td');
                const daya = parseFloat(sel[1].getAttribute('data-daya'));
                const durasi = parseFloat(sel[2].getAttribute('data-durasi'));
                
                // Hitung kWh per hari untuk satu alat: (Watt * Jam) / 1000
                const kwhHarian = (daya * durasi) / 1000;
                totalKwhHarian += kwhHarian;
            }

            // Hitung total bulanan (asumsi 1 bulan = 30 hari)
            const totalKwhBulanan = totalKwhHarian * 30;
            const totalBiaya = totalKwhBulanan * tarifPerKwh;
            
            // Format angka menjadi format mata uang Rupiah
            const formatRupiah = new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0
            });

            // Tampilkan hasil
            hasilDiv.style.display = 'block';
            hasilDiv.innerHTML = `
                <div class="alert alert-success">
                    <h4 class="alert-heading">Estimasi Biaya Listrik Anda</h4>
                    <p>
                        Total pemakaian harian: <strong>${totalKwhHarian.toFixed(2)} kWh</strong><br>
                        Total pemakaian bulanan (30 hari): <strong>${totalKwhBulanan.toFixed(2)} kWh</strong>
                    </p>
                    <hr>
                    <p class="mb-0 fs-5">
                        Estimasi total biaya untuk satu bulan adalah: <strong>${formatRupiah.format(totalBiaya)}</strong>
                    </p>
                </div>
            `;
        });
        
        // Panggil fungsi cekTabelKosong saat halaman pertama kali dimuat
        cekTabelKosong();
    </script>
</body>
</html>
