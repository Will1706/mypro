<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Uji Tegangan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        /* CSS tambahan untuk tampilan yang lebih baik di mobile */
        body {
            background-color: #f8f9fa;
        }
        .calculator-card {
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .form-control, .form-select {
            height: 50px;
        }
        .result-display {
            background-color: #e9ecef;
            border-radius: .375rem;
            padding: 0.75rem;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            min-height: 70px; /* Menyamakan tinggi */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-primary {
            height: 50px;
        }
    </style>
</head>
<body>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">

                <div class="card calculator-card">
                    <div class="card-header text-center bg-primary text-white">
                        <h3><i class="bi bi-lightning-charge-fill me-2"></i>Kalkulator Uji Tegangan</h3>
                    </div>
                    <div class="card-body p-4">
                        <form id="voltageForm">
                            <div class="mb-3">
                                <label for="teganganInput" class="form-label fw-bold">1. Input Tegangan (Uo) dalam kV</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-input-cursor-text"></i></span>
                                    <input type="number" class="form-control" id="teganganInput" placeholder="Contoh: 12" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="faktorPengali" class="form-label fw-bold">2. Pilih Faktor Pengali</label>
                                <div class="input-group">
                                     <span class="input-group-text"><i class="bi bi-x-diamond-fill"></i></span>
                                     <select class="form-select" id="faktorPengali">
                                        <option value="3.5" selected>3.5 x Uo</option>
                                        <option value="2.5+2">2.5 x Uo + 2kV</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">3. Hasil Uji Tegangan (kV)</label>
                                <div class="result-display" id="hasilPerkalian">
                                    -
                                </div>
                            </div>

                            <div class="d-grid">
                                <button type="button" class="btn btn-danger" id="resetBtn"><i class="bi bi-arrow-counterclockwise me-2"></i>Reset</button>
                            </div>
                        </form>
                    </div>
                    <div class="card-footer text-center text-muted small">
                        Dibuat untuk kemudahan perhitungan
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
        // Memilih elemen-elemen yang diperlukan dari DOM
        const teganganInput = document.getElementById('teganganInput');
        const faktorPengali = document.getElementById('faktorPengali');
        const hasilPerkalian = document.getElementById('hasilPerkalian');
        const resetBtn = document.getElementById('resetBtn');

        // Fungsi utama untuk melakukan kalkulasi
        function hitungTegangan() {
            const tegangan = parseFloat(teganganInput.value);
            const pengali = faktorPengali.value;
            
            // Cek apakah input tegangan valid (berupa angka)
            if (isNaN(tegangan) || tegangan <= 0) {
                hasilPerkalian.textContent = '-';
                return;
            }

            let hasil = 0;
            // Logika perhitungan berdasarkan pilihan faktor pengali
            if (pengali === '3.5') {
                hasil = tegangan * 3.5;
            } else if (pengali === '2.5+2') {
                hasil = (tegangan * 2.5) + 2;
            }

            // Menampilkan hasil dengan format 2 angka di belakang koma jika perlu
            hasilPerkalian.textContent = hasil.toLocaleString('id-ID', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
        }
        
        // Fungsi untuk mereset semua input
        function resetKalkulator() {
            document.getElementById('voltageForm').reset();
            hasilPerkalian.textContent = '-';
        }

        // Menambahkan event listener untuk input dan select
        // Kalkulasi akan berjalan otomatis setiap kali ada perubahan
        teganganInput.addEventListener('input', hitungTegangan);
        faktorPengali.addEventListener('change', hitungTegangan);
        resetBtn.addEventListener('click', resetKalkulator);
    </script>
</body>
</html>
