<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Uji Tegangan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        /* CSS tambahan untuk tampilan yang lebih baik di mobile */
        body {
            background-color: #f8f9fa;
        }
        .calculator-card {
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .form-control, .form-select {
            height: 50px;
        }
        .result-display {
            background-color: #e9ecef;
            border-radius: .375rem;
            padding: 0.75rem;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            min-height: 70px; /* Menyamakan tinggi */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-primary {
            height: 50px;
        }
    </style>
</head>
<body>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">

                <div class="card calculator-card">
                    <div class="card-header text-center bg-primary text-white">
                        <h3><i class="bi bi-lightning-charge-fill me-2"></i>Kalkulator Uji Tegangan</h3>
                    </div>
                    <div class="card-body p-4">
                        <form id="voltageForm">
                            <div class="mb-3">
                                <label for="teganganInput" class="form-label fw-bold">Input Tegangan (Uo) dalam kV</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-input-cursor-text"></i></span>
                                    <input type="number" class="form-control" id="teganganInput" placeholder="Contoh: 12" required>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="standarUji" class="form-label fw-bold">Standar Uji</label>
                                <div class="input-group">
                                     <span class="input-group-text"><i class="bi bi-journal-bookmark-fill"></i></span>
                                     <select class="form-select" id="standarUji">
                                        <option value="iec" selected>IEC</option>
                                        <option value="icea">ICEA</option>
                                        <option value="asnza">AS/NZS</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="faktorPengali" class="form-label fw-bold">Faktor Tegangan Uo</label>
                                <div class="input-group">
                                     <span class="input-group-text"><i class="bi bi-x-diamond-fill"></i></span>
                                     <select class="form-select" id="faktorPengali">
                                        </select>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Hasil Uji Tegangan (kV)</label>
                                <div class="result-display" id="hasilPerkalian">
                                    -
                                </div>
                            </div>

                            <div class="d-grid">
                                <button type="button" class="btn btn-danger" id="resetBtn"><i class="bi bi-arrow-counterclockwise me-2"></i>Reset</button>
                            </div>
                        </form>
                    </div>
                    <div class="card-footer text-center text-muted small">
                        Pilih standar untuk melihat faktor uji yang sesuai.
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
        // Memilih elemen-elemen yang diperlukan dari DOM
        const teganganInput = document.getElementById('teganganInput');
        const standarUji = document.getElementById('standarUji');
        const faktorPengali = document.getElementById('faktorPengali');
        const hasilPerkalian = document.getElementById('hasilPerkalian');
        const resetBtn = document.getElementById('resetBtn');

        // Data faktor pengali untuk setiap standar
        const faktorData = {
            iec: [
                { text: '3.5', value: '3.5' },
                { text: '2.5 + 2kV', value: '2.5+2' }
            ],
            icea: [
                // Contoh data untuk ICEA, bisa disesuaikan
                { text: 'Faktor A', value: 'icea_a' },
                { text: 'Faktor B', value: 'icea_b' }
            ],
            asnza: [
                // Contoh data untuk AS/NZS, bisa disesuaikan
                { text: 'Faktor X', value: 'as_x' },
                { text: 'Faktor Y', value: 'as_y' }
            ]
        };

        // Fungsi untuk memperbarui opsi faktor pengali berdasarkan standar yang dipilih
        function updateFaktorOptions() {
            const standarValue = standarUji.value;
            faktorPengali.innerHTML = ''; // Kosongkan opsi sebelumnya

            faktorData[standarValue].forEach(opsi => {
                const optionElement = document.createElement('option');
                optionElement.value = opsi.value;
                optionElement.textContent = opsi.text;
                faktorPengali.appendChild(optionElement);
            });
            
            // Setelah memperbarui opsi, langsung hitung ulang
            hitungTegangan();
        }

        // Fungsi utama untuk melakukan kalkulasi
        function hitungTegangan() {
            const tegangan = parseFloat(teganganInput.value);
            const pengaliValue = faktorPengali.value;
            
            // Cek apakah input tegangan valid (berupa angka)
            if (isNaN(tegangan) || tegangan <= 0) {
                hasilPerkalian.textContent = '-';
                return;
            }

            let hasil = 0;
            // Logika perhitungan berdasarkan pilihan faktor pengali
            // Sesuaikan rumus berdasarkan 'value' yang unik untuk setiap standar
            switch (pengaliValue) {
                case '3.5':
                    hasil = tegangan * 3.5;
                    break;
                case '2.5+2':
                    hasil = (tegangan * 2.5) + 2;
                    break;
                case 'icea_a':
                    // Ganti dengan rumus sebenarnya untuk ICEA Faktor A
                    hasil = tegangan * 4; 
                    break;
                case 'icea_b':
                     // Ganti dengan rumus sebenarnya untuk ICEA Faktor B
                    hasil = tegangan * 3.8;
                    break;
                case 'as_x':
                     // Ganti dengan rumus sebenarnya untuk AS/NZS Faktor X
                    hasil = tegangan * 3.0;
                    break;
                case 'as_y':
                     // Ganti dengan rumus sebenarnya untuk AS/NZS Faktor Y
                    hasil = tegangan * 2.8;
                    break;
                default:
                    hasil = 0;
            }

            // Menampilkan hasil
            if (hasil > 0) {
                hasilPerkalian.textContent = hasil.toLocaleString('id-ID', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
            } else {
                hasilPerkalian.textContent = '-';
            }
        }
        
        // Fungsi untuk mereset semua input
        function resetKalkulator() {
            document.getElementById('voltageForm').reset();
            updateFaktorOptions(); // Reset pilihan faktor ke default (IEC)
            hasilPerkalian.textContent = '-';
        }

        // --- EVENT LISTENERS ---
        // Saat nilai input tegangan berubah
        teganganInput.addEventListener('input', hitungTegangan);
        // Saat pilihan standar berubah
        standarUji.addEventListener('change', updateFaktorOptions);
        // Saat pilihan faktor pengali berubah
        faktorPengali.addEventListener('change', hitungTegangan);
        // Saat tombol reset diklik
        resetBtn.addEventListener('click', resetKalkulator);

        // Panggil fungsi updateFaktorOptions saat halaman pertama kali dimuat
        // untuk mengisi pilihan faktor IEC sebagai default.
        document.addEventListener('DOMContentLoaded', updateFaktorOptions);

    </script>
</body>
</html>
