<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencari Metadata Musik</title>
    
    <!-- [FIX] Mengganti xintegrity menjadi integrity -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" xintegrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            padding-top: 70px; 
            padding-bottom: 3rem; 
        }
        .card { border: none; }
        .metadata-list dt {
            font-weight: 600;
            color: #6c757d;
        }
        .metadata-list dd {
            font-weight: 500;
            color: #212529;
        }
        .list-group-item-action { cursor: pointer; }
        .list-group-item-action:hover { background-color: #f8f9fa; }
        
        .list-group-item.active {
            z-index: 2;
            color: var(--bs-list-group-active-color);
            background-color: var(--bs-list-group-active-bg);
            border-color: var(--bs-list-group-active-border-color);
        }
        
        #album-cover {
            max-height: 350px;
            width: auto;
            max-width: 100%;
            object-fit: cover;
        }
        .pagination .page-link {
            cursor: pointer;
        }
        .song-item-title {
            font-weight: 500;
        }
        .song-item-artist {
            color: #495057;
        }
        .song-item-album {
            font-size: 0.85rem;
            color: #6c757d;
            font-style: italic;
        }
        
        #full-history-list .list-group-item {
            border-left: none;
            border-right: none;
            padding-left: 0;
            padding-right: 0;
        }
        #full-history-list .list-group-item {
            padding-left: 1.25rem;
            padding-right: 1.25rem;
        }
        
        .navbar {
            transition: background-color 0.3s ease-in-out;
        }
        .navbar-scrolled {
            background-color: rgba(255, 255, 255, 0.85) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: background-color 0.3s ease-in-out;
        }
        
        /* CSS untuk kolom sticky di desktop */
        @media (min-width: 992px) {
            .sticky-col-lg {
                position: sticky;
                top: 86px; /* 70px navbar + 16px buffer */
                align-self: start; /* Penting untuk flex container .row */
                
                /* [FIX] Menambahkan max-height dan overflow untuk menangani konten tinggi */
                max-height: calc(100vh - 102px); /* 100vh - top offset - bottom buffer */
                overflow-y: auto;
            }
        }
    </style>
</head>
<body>

    <!-- Navbar (Tidak berubah) -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top" id="main-navbar">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-music-note-beamed me-1"></i>
                Pencari Metadata
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Beranda</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Struktur layout 3 kolom -->
        <div class="row justify-content-center">
            <div class="col-xl-12">
                <div class="row">

                    <!-- Kolom Aplikasi Utama (Tengah) -->
                    <div class="col-lg-5 order-lg-2">
                        <div class="card shadow-sm rounded-4">
                            <div class="card-body p-4 p-md-5">
                                
                                <h1 class="h3 text-center mb-3 fw-bold">Pencari Metadata Musik</h1>
                                <p class="text-center text-muted mb-4">Masukkan artis, album, atau judul lagu untuk mencari.</p>

                                <!-- Form Pencarian -->
                                <form id="search-form" class="mb-4">
                                    <div class="d-flex">
                                        <input type="text" class="form-control form-control-lg me-2 rounded-3" id="search-input" placeholder="Contoh: Radja" aria-label="Kueri pencarian musik" required>
                                        <button type="submit" class="btn btn-primary btn-lg rounded-3 fw-semibold">Cari</button>
                                    </div>
                                </form>

                                <!-- 1. Pilihan Lagu (tersembunyi) -->
                                <div id="selection-container" class="d-none mt-4">
                                    <p class="text-muted fw-semibold" id="search-result-count"></p>
                                    <div class="list-group" id="selection-list">
                                        <!-- Opsi akan dimasukkan oleh JavaScript -->
                                    </div>
                                    <div id="pagination-controls" class="mt-3"></div>
                                </div>

                                <!-- 2. Loading Spinner (tersembunyi) -->
                                <div id="loading-spinner" class="text-center my-4 d-none">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">Mencari...</span>
                                    </div>
                                    <p class="mt-2 text-muted">Mencari...</p>
                                </div>

                                <!-- 3. Pesan Error (tersembunyi) -->
                                <div id="error-message" class="alert alert-danger rounded-3 d-none" role="alert">
                                    <!-- Teks error akan dimasukkan oleh JavaScript -->
                                </div>

                            </div>
                        </div>
                    </div>

                    <!-- 
                      Blok Detail (Kanan)
                      Menambahkan class 'sticky-col-lg'
                    -->
                    <div class="col-lg-4 order-lg-3 sticky-col-lg">
                        <div id="results-container" class="card shadow-sm rounded-4 d-none">
                            <div class="card-body p-4 p-md-5">
                                <div class="animate-fade-in">
                                    <button id="back-to-selection-btn" class="btn btn-light btn-sm rounded-pill mb-3 d-none">
                                        <i class="bi bi-arrow-left me-1"></i> Kembali ke daftar
                                    </button>
                                    
                                    <div class="text-center mb-4">
                                        <img src="" id="album-cover" class="img-fluid rounded-3 shadow-sm" alt="Sampul Album">
                                    </div>
                                    
                                    <h2 class="h4 text-center mb-4 fw-semibold" id="result-title"></h2>

                                    <dl class="row metadata-list">
                                        <dt class="col-sm-4 col-lg-3">Artis:</dt>
                                        <dd class="col-sm-8 col-lg-9" id="result-artist"></dd>

                                        <dt class="col-sm-4 col-lg-3">Album:</dt>
                                        <dd class="col-sm-8 col-lg-9" id="result-album"></dd>

                                        <dt class="col-sm-4 col-lg-3">Tahun Rilis:</dt>
                                        <dd class="col-sm-8 col-lg-9" id="result-year"></dd>

                                        <dt class="col-sm-4 col-lg-3">Genre:</dt>
                                        <dd class="col-sm-8 col-lg-9" id="result-genre"></dd>
                                        
                                        <dt class="col-sm-4 col-lg-3">Label / Hak Cipta:</dt>
                                        <dd class="col-sm-8 col-lg-9" id="result-copyright"></dd>
                                    
                                    </dl>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 
                      Blok Riwayat (Kiri)
                      Menambahkan class 'sticky-col-lg'
                    -->
                    <div class="col-lg-3 order-lg-1 sticky-col-lg">
                        <div id="history-container" class="d-none mb-4 mb-lg-0">
                            <div class="d-flex justify-content-between align-items-center mb-2 px-2">
                                <h6 class="text-muted mb-0 fw-semibold">Riwayat Pencarian</h6>
                                <div>
                                    <button id="show-more-history-btn" class="btn btn-link btn-sm text-primary p-0 me-2 d-none" style="text-decoration: none;" data-bs-toggle="modal" data-bs-target="#history-modal">
                                        Lainnya
                                    </button>
                                    <button id="clear-history-btn" class="btn btn-link btn-sm text-danger p-0" style="text-decoration: none;">Bersihkan</button>
                                </div>
                            </div>
                            <div id="history-list" class="list-group rounded-3 shadow-sm">
                                <!-- Riwayat (max 3) akan diisi oleh JavaScript -->
                            </div>
                        </div>
                    </div>

                    <!-- Footer -->
                    <footer class="text-center text-muted mt-4 col-12 order-lg-4">
                        <small>Dibuat dengan Bootstrap 5</small>
                    </footer>

                </div>
            </div>
        </div>
    </div>

    <!-- Modal Riwayat Lengkap (Tidak berubah) -->
    <div class="modal fade" id="history-modal" tabindex="-1" aria-labelledby="history-modal-label" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content rounded-4">
                <div class="modal-header border-0">
                    <h1 class="modal-title fs-5" id="history-modal-label">Semua Riwayat Pencarian</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body pt-0">
                    <div id="full-history-list" class="list-group list-group-flush">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- [FIX] Mengganti xintegrity menjadi integrity -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" xintegrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
    <!-- JavaScript (Tidak berubah dari versi sebelumnya) -->
    <script>
        const placeholderImg = "https://placehold.co/400x400/6c757d/ffffff?text=Cover+Album";
        
        const HISTORY_KEY = 'musicSearchHistory';
        const MAX_HISTORY = 10;
        const MAX_VISIBLE_HISTORY = 3; 

        let currentResults = [];
        let currentPage = 1;
        const itemsPerPage = 50;
        
        let historyModal;

        const isDesktop = () => window.innerWidth >= 992; // Bootstrap 'lg' breakpoint

        // --- Seleksi Elemen DOM ---
        const searchForm = document.getElementById('search-form');
        const searchInput = document.getElementById('search-input');
        
        const historyContainer = document.getElementById('history-container');
        const historyList = document.getElementById('history-list'); 
        const clearHistoryBtn = document.getElementById('clear-history-btn');
        const showMoreHistoryBtn = document.getElementById('show-more-history-btn'); 
        const fullHistoryList = document.getElementById('full-history-list'); 

        const selectionContainer = document.getElementById('selection-container');
        const selectionList = document.getElementById('selection-list');
        const searchResultCount = document.getElementById('search-result-count');
        const paginationControls = document.getElementById('pagination-controls');
        
        const resultsContainer = document.getElementById('results-container');
        const loadingSpinner = document.getElementById('loading-spinner');
        const errorMessage = document.getElementById('error-message');
        
        const albumCover = document.getElementById('album-cover');
        const resultTitle = document.getElementById('result-title');
        const resultArtist = document.getElementById('result-artist');
        const resultAlbum = document.getElementById('result-album');
        const resultYear = document.getElementById('result-year');
        const resultGenre = document.getElementById('result-genre');
        const resultCopyright = document.getElementById('result-copyright'); 
        
        const backToSelectionBtn = document.getElementById('back-to-selection-btn');
        
        const mainNavbar = document.getElementById('main-navbar');


        // --- Event Listener ---
        
        searchForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const query = searchInput.value.trim();
            await startSearch(query);
        });

        backToSelectionBtn.addEventListener('click', () => {
            resultsContainer.classList.add('d-none');
            selectionContainer.classList.remove('d-none');
            
            const allButtons = document.querySelectorAll('#selection-list .list-group-item');
            allButtons.forEach(btn => btn.classList.remove('active'));
        });


        paginationControls.addEventListener('click', (e) => {
            e.preventDefault();
            const target = e.target;
            if (target.tagName === 'A' && target.closest('.page-item') && target.dataset.page) {
                const newPage = parseInt(target.dataset.page, 10);
                if (newPage !== currentPage) {
                    displaySelection(newPage);
                    selectionContainer.scrollIntoView({ behavior: 'smooth' });
                }
            }
        });
        
        clearHistoryBtn.addEventListener('click', () => {
            localStorage.removeItem(HISTORY_KEY);
            renderHistory();
            if (historyModal) {
                historyModal.hide(); 
            }
        });

        // --- Fungsi Inti untuk memulai pencarian ---
        async function startSearch(query) {
            if (!query) return;
            
            searchInput.value = query;
            
            resultsContainer.classList.add('d-none');
            errorMessage.classList.add('d-none');
            selectionContainer.classList.add('d-none');
            loadingSpinner.classList.remove('d-none');
            currentResults = []; 
            currentPage = 1; 

            await performSearch(query);
        }

        // --- Fungsi Pencarian ---
        async function performSearch(query) {
            addSearchToHistory(query);

            const apiUrl = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=200&country=ID`; 

            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                loadingSpinner.classList.add('d-none');

                if (data.resultCount > 0) {
                    currentResults = data.results.sort((a, b) => {
                        const albumA = a.collectionName || '';
                        const albumB = b.collectionName || '';
                        const albumCompare = albumA.localeCompare(albumB);
                        if (albumCompare !== 0) return albumCompare;
                        return (a.trackNumber || 0) - (b.trackNumber || 0);
                    });
                    
                    if (data.resultCount === 1) {
                        searchResultCount.textContent = `Menampilkan 1 hasil:`;
                        displaySelection(1);
                        displayResults(currentResults[0]);
                        setTimeout(() => {
                            const firstItem = document.querySelector('#selection-list .list-group-item');
                            if (firstItem) firstItem.classList.add('active');
                        }, 0);
                        
                    } else {
                        searchResultCount.textContent = `Menampilkan ${currentResults.length} hasil, diurutkan berdasarkan album:`;
                        displaySelection(1);
                    }
                } else {
                    showError(`Hasil untuk "${query}" tidak ditemukan.`);
                }
            } catch (error) {
                console.error("Fetch error:", error);
                loadingSpinner.classList.add('d-none');
                showError("Terjadi kesalahan saat mengambil data. Periksa koneksi internet Anda.");
            }
        }
        
        // --- Fungsi-fungsi Riwayat ---
        function getHistory() {
            const history = localStorage.getItem(HISTORY_KEY);
            return history ? JSON.parse(history) : [];
        }
        
        function saveHistory(history) {
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        }

        function addSearchToHistory(term) {
            let history = getHistory();
            const normalizedTerm = term.toLowerCase();
            history = history.filter(item => item.toLowerCase() !== normalizedTerm);
            history.unshift(term);
            history = history.slice(0, MAX_HISTORY);
            saveHistory(history);
            renderHistory(); 
        }
        
        function createHistoryButton(term, isModalButton = false) {
            const button = document.createElement('button');
            button.type = 'button';
            
            button.className = 'list-group-item list-group-item-action';
            
            if (isModalButton) {
                button.dataset.bsDismiss = 'modal'; 
            }
            button.textContent = term;
            
            button.addEventListener('click', async () => {
                await startSearch(term);
            });
            
            return button;
        }

        function renderHistory() {
            const history = getHistory();
            historyList.innerHTML = '';         
            fullHistoryList.innerHTML = ''; 
        
            if (history.length === 0) {
                historyContainer.classList.add('d-none');
                showMoreHistoryBtn.classList.add('d-none');
                return;
            }

            historyContainer.classList.remove('d-none');
        
            const visibleHistory = history.slice(0, MAX_VISIBLE_HISTORY);
            visibleHistory.forEach(term => {
                historyList.appendChild(createHistoryButton(term, false));
            });
        
            history.forEach(term => {
                fullHistoryList.appendChild(createHistoryButton(term, true)); 
            });
        
            if (history.length > MAX_VISIBLE_HISTORY) {
                showMoreHistoryBtn.classList.remove('d-none');
            } else {
                showMoreHistoryBtn.classList.add('d-none');
            }
        }
        
        // --- Akhir Fungsi Riwayat ---
        
        // --- Fungsi Menampilkan Pilihan (dengan Pagination) ---
        function displaySelection(page) {
            currentPage = page;
            selectionList.innerHTML = ''; 
            
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const paginatedItems = currentResults.slice(start, end);

            paginatedItems.forEach((song) => {
                const globalIndex = currentResults.indexOf(song);
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'list-group-item list-group-item-action';
                button.dataset.index = globalIndex; 
                
                button.innerHTML = `
                    <div class="d-flex w-100 justify-content-between">
                        <span class="song-item-title">${song.trackName}</span>
                        <small class="text-muted">${song.trackNumber || ''}</small>
                    </div>
                    <p class="mb-1 song-item-artist">${song.artistName}</p>
                    <small class="song-item-album">${song.collectionName || 'Single'}</small>
                `;
                
                button.addEventListener('click', (e) => {
                    const allButtons = document.querySelectorAll('#selection-list .list-group-item');
                    allButtons.forEach(btn => btn.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                    
                    const selectedIndex = e.currentTarget.dataset.index;
                    displayResults(currentResults[selectedIndex]); 
                });
                
                selectionList.appendChild(button);
            });

            renderPagination();
            selectionContainer.classList.remove('d-none'); 
        }

        // --- Fungsi Pagination ---
        function renderPagination() {
            const totalItems = currentResults.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            const maxPagesToShow = 5; 

            if (totalPages <= 1) {
                paginationControls.innerHTML = '';
                return;
            }

            const createPageItem = (page, text, isActive = false, isDisabled = false) => {
                if (isDisabled) {
                    return `<li class="page-item disabled"><span class="page-link">${text}</span></li>`;
                }
                if (isActive) {
                    return `<li class="page-item active"><span class="page-link">${text}<span class="visually-hidden">(current)</span></span></li>`;
                }
                if (text === '...') {
                     return `<li class="page-item disabled"><span class="page-link">...</span></li>`;
                }
                return `<li class="page-item"><a class="page-link" href="#" data-page="${page}">${text}</a></li>`;
            };

            let paginationHTML = '<nav aria-label="Page navigation"><ul class="pagination pagination-sm justify-content-center flex-wrap">';

            if (totalPages <= maxPagesToShow) {
                for (let i = 1; i <= totalPages; i++) {
                    paginationHTML += createPageItem(i, i, i === currentPage);
                }
            } 
            else {
                let startPage = Math.max(1, currentPage - 2);
                let endPage = Math.min(totalPages, startPage + maxPagesToShow - 1);

                if (endPage === totalPages) {
                    startPage = Math.max(1, totalPages - maxPagesToShow + 1);
                }
                if (startPage === 1) {
                    endPage = Math.min(totalPages, maxPagesToShow);
                }

                if (startPage > 1) {
                    paginationHTML += createPageItem(1, 'First');
                    if(startPage > 2) {
                       paginationHTML += createPageItem(null, '...', false, true);
                    }
                }

                for (let i = startPage; i <= endPage; i++) {
                    paginationHTML += createPageItem(i, i, i === currentPage);
                }

                if (endPage < totalPages) {
                    if(endPage < totalPages - 1) {
                        paginationHTML += createPageItem(null, '...', false, true);
                    }
                    paginationHTML += createPageItem(totalPages, 'Last');
                }
            }

            paginationHTML += '</ul></nav>';
            paginationControls.innerHTML = paginationHTML;
        }

        // --- Fungsi Menampilkan Hasil Akhir ---
        function displayResults(song) {
            
            if (!isDesktop()) {
                // --- LOGIKA MOBILE ---
                selectionContainer.classList.add('d-none');
                if (currentResults.length > 1) {
                    backToSelectionBtn.classList.remove('d-none');
                } else {
                    backToSelectionBtn.classList.add('d-none');
                }
            } else {
                // --- LOGIKA DESKTOP ---
                selectionContainer.classList.remove('d-none');
                backToSelectionBtn.classList.add('d-none');
            }
            
            // --- Logika Umum (isi data) ---
            resultTitle.textContent = song.trackName || "Judul tidak diketahui";
            
            const highResCover = song.artworkUrl100 ? song.artworkUrl100.replace('100x100', '400x400') : placeholderImg;
            
            albumCover.onerror = () => {
                console.warn("Gagal memuat sampul album, menggunakan placeholder.");
                albumCover.src = placeholderImg;
            };
            albumCover.src = highResCover;

            resultArtist.textContent = song.artistName || "-";
            resultAlbum.textContent = song.collectionName || "-";
            resultYear.textContent = song.releaseDate ? new Date(song.releaseDate).getFullYear() : "-";
            resultGenre.textContent = song.primaryGenreName || "-";
            resultCopyright.textContent = song.copyright || "-"; 

            resultsContainer.classList.remove('d-none');
        }

        // --- Fungsi Helper ---
        function showError(message) {
            selectionContainer.classList.add('d-none');
            resultsContainer.classList.add('d-none'); 
            errorMessage.textContent = message;
            errorMessage.classList.remove('d-none');
        }

        // --- Inisialisasi Riwayat saat halaman dimuat ---
        document.addEventListener('DOMContentLoaded', () => {
            historyModal = new bootstrap.Modal(document.getElementById('history-modal'));
            renderHistory();

            // Event listener untuk efek scroll navbar
            if (mainNavbar) {
                window.addEventListener('scroll', () => {
                    if (window.scrollY > 50) {
                        mainNavbar.classList.add('navbar-scrolled');
                    } else {
                        mainNavbar.classList.remove('navbar-scrolled');
                    }
                });
            }

            // Listener untuk memperbaiki layout saat resize
            let resizeTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    if (currentResults.length > 0 && loadingSpinner.classList.contains('d-none') && errorMessage.classList.contains('d-none')) {
                        
                        if (isDesktop()) {
                            // RESIZE KE DESKTOP:
                            selectionContainer.classList.remove('d-none');
                            backToSelectionBtn.classList.add('d-none');
                        } else {
                            // RESIZE KE MOBILE:
                            if (!resultsContainer.classList.contains('d-none')) {
                                selectionContainer.classList.add('d-none');
                                if (currentResults.length > 1) {
                                    backToSelectionBtn.classList.remove('d-none');
                                }
                            }
                        }
                    }
                }, 200); // Debounce
            });
        });

    </script>

</body>
</html>
