<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Video Lokal</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f8f9fa;
        }
        .video-player-container {
            position: sticky;
            top: 20px;
        }
        .playlist .card {
            cursor: pointer;
            transition: transform 0.2s ease-in-out;
        }
        .playlist .card:hover {
            transform: scale(1.05);
            border-color: #0d6efd;
        }
        .playlist .card.active {
            border: 2px solid #0d6efd;
            box-shadow: 0 0 10px rgba(13, 110, 253, 0.5);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">🎬 Video Player Lokal</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-lg-8">
                <div class="video-player-container mb-4">
                    <h3 id="video-title">Pilih video untuk diputar</h3>
                    <div class="ratio ratio-16x9">
                        <video id="main-video-player" src="" controls autoplay class="w-100"></video>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <h3>Playlist</h3>
                <div id="video-playlist" class="playlist">
                    </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const mainVideoPlayer = document.getElementById('main-video-player');
            const videoTitle = document.getElementById('video-title');
            const playlistContainer = document.getElementById('video-playlist');

            // --- INI BAGIAN YANG DIREVISI ---
            // Daftar video dari folder lokal.
            // Pastikan nama file video sesuai dengan yang ada di folder /videos.
            const videos = [
                {
                    title: 'Video Alam Indah',
                    url: 'videos/video1.mp4', // Path ke file lokal
                    thumbnail: 'https://via.placeholder.com/150/92c952/FFFFFF?text=Video+1'
                },
                {
                    title: 'Perjalanan Kota',
                    url: 'videos/video2.mp4', // Path ke file lokal
                    thumbnail: 'https://via.placeholder.com/150/771796/FFFFFF?text=Video+2'
                },
                {
                    title: 'Pemandangan Pantai',
                    url: 'videos/video3.mp4', // Path ke file lokal
                    thumbnail: 'https://via.placeholder.com/150/24f355/FFFFFF?text=Video+3'
                }
                // Tambahkan video lain di sini
            ];

            // Fungsi untuk membuat elemen playlist
            function generatePlaylist() {
                videos.forEach((video) => {
                    const card = document.createElement('div');
                    card.className = 'card mb-3';
                    card.setAttribute('data-video-url', video.url);
                    card.setAttribute('data-video-title', video.title);
                    
                    card.innerHTML = `
                        <div class="row g-0">
                            <div class="col-4">
                                <img src="${video.thumbnail}" class="img-fluid rounded-start" alt="Thumbnail ${video.title}">
                            </div>
                            <div class="col-8">
                                <div class="card-body py-2 px-3">
                                    <h6 class="card-title mb-0">${video.title}</h6>
                                </div>
                            </div>
                        </div>
                    `;
                    playlistContainer.appendChild(card);
                });
            }

            // Fungsi untuk mengganti video yang sedang diputar
            function changeVideo(card) {
                document.querySelectorAll('.playlist .card').forEach(item => item.classList.remove('active'));
                card.classList.add('active');
                
                const videoUrl = card.getAttribute('data-video-url');
                const videoTitleText = card.getAttribute('data-video-title');

                videoTitle.textContent = videoTitleText;
                mainVideoPlayer.src = videoUrl;
                mainVideoPlayer.play();
            }
            
            // Inisialisasi playlist
            generatePlaylist();
            
            // Tambahkan event listener untuk setiap item di playlist
            const playlistItems = document.querySelectorAll('.playlist .card');
            playlistItems.forEach(card => {
                card.addEventListener('click', () => changeVideo(card));
            });

            // Atur video pertama sebagai default (tapi tidak langsung diputar)
            if (playlistItems.length > 0) {
                const firstCard = playlistItems[0];
                const videoUrl = firstCard.getAttribute('data-video-url');
                
                mainVideoPlayer.src = videoUrl;
                videoTitle.textContent = "Pilih video dari playlist";
            }
        });
    </script>
</body>
</html>
