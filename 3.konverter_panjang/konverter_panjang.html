<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Konversi Panjang</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">

    <div class="w-full max-w-2xl mx-auto bg-white rounded-xl shadow-md p-6">
        
        <h1 class="text-xl font-bold text-center text-gray-800 pb-4 mb-6 border-b border-gray-200">
            Kalkulator Konversi Panjang
        </h1>

        <div class="space-y-4">
            
            <div>
                <label for="nilaiInput" class="block text-sm font-bold text-gray-700">Nilai</label>
                <input type="text" inputmode="decimal" name="nilaiInput" id="nilaiInput" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="Masukkan nilai panjang">
            </div>

            <div class="flex gap-4">
                <div class="w-1/2">
                    <label for="dariSatuan" class="block text-sm font-bold text-gray-700">Dari Satuan</label>
                    <select id="dariSatuan" name="dariSatuan" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        <option value="m">Meter (m)</option>
                        <option value="km">Kilometer (km)</option>
                        <option value="cm">Sentimeter (cm)</option>
                        <option value="mm">Milimeter (mm)</option>
                        <option value="mi">Mil (mi)</option>
                        <option value="yd">Yard (yd)</option>
                        <option value="ft">Kaki (ft)</option>
                        <option value="in">Inci (in)</option>
                    </select>
                </div>
                <div class="w-1/2">
                    <label for="keSatuan" class="block text-sm font-bold text-gray-700">Ke Satuan</label>
                    <select id="keSatuan" name="keSatuan" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        <option value="km">Kilometer (km)</option>
                        <option value="m">Meter (m)</option>
                        <option value="cm">Sentimeter (cm)</option>
                        <option value="mm">Milimeter (mm)</option>
                        <option value="mi">Mil (mi)</option>
                        <option value="yd">Yard (yd)</option>
                        <option value="ft">Kaki (ft)</option>
                        <option value="in">Inci (in)</option>
                    </select>
                </div>
            </div>

            <div class="pt-2">
                <label for="hasilKonversi" class="block text-sm font-bold text-gray-700">Hasil Konversi</label>
                <input type="text" name="hasilKonversi" id="hasilKonversi" readonly class="mt-1 block w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 font-bold text-lg text-center">
            </div>
            
            <div class="pt-4 flex flex-wrap gap-2">
                <button type="button" onclick="history.back()" class="flex-1 text-center justify-center py-2 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    Kembali
                </button>
                <button type="button" id="hapusBtn" class="flex-1 text-center justify-center py-2 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
                    Hapus
                </button>
                <a href="/" class="flex-1 text-center justify-center py-2 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                    Beranda
                </a>
            </div>

        </div>

        <footer class="text-center text-gray-500 text-sm mt-6 pt-4 border-t border-gray-200">
            Williyanto Adi 2025
        </footer>

    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {

        // Ambil elemen dari DOM
        const nilaiInput = document.getElementById('nilaiInput');
        const dariSatuanSelect = document.getElementById('dariSatuan');
        const keSatuanSelect = document.getElementById('keSatuan');
        const hasilKonversiInput = document.getElementById('hasilKonversi');
        const hapusBtn = document.getElementById('hapusBtn');

        // Faktor konversi ke satuan dasar (meter)
        const faktorKeMeter = {
            'm': 1,
            'km': 1000,
            'cm': 0.01,
            'mm': 0.001,
            'mi': 1609.34,
            'yd': 0.9144,
            'ft': 0.3048,
            'in': 0.0254
        };

        // Fungsi utama untuk menghitung konversi
        function hitungKonversi() {
            const nilai = parseFloat(nilaiInput.value);
            const dariSatuan = dariSatuanSelect.value;
            const keSatuan = keSatuanSelect.value;

            if (!isNaN(nilai)) {
                // 1. Konversi nilai input ke meter
                const nilaiDalamMeter = nilai * faktorKeMeter[dariSatuan];
                
                // 2. Konversi dari meter ke satuan tujuan
                const hasil = nilaiDalamMeter / faktorKeMeter[keSatuan];
                
                // Tampilkan hasil dengan presisi yang cukup
                hasilKonversiInput.value = Number(hasil.toPrecision(9));
            } else {
                hasilKonversiInput.value = '';
            }
        }
        
        // Fungsi untuk menghapus input
        function hapus() {
            nilaiInput.value = '';
            hasilKonversiInput.value = '';
        }
        
        // --- Tambahkan semua event listener ---
        nilaiInput.addEventListener('input', hitungKonversi);
        dariSatuanSelect.addEventListener('change', hitungKonversi);
        keSatuanSelect.addEventListener('change', hitungKonversi);
        hapusBtn.addEventListener('click', hapus);
        
        // Panggil sekali di awal untuk inisialisasi jika ada nilai default
        hitungKonversi();
    });
    </script>

</body>
</html>
