<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Hambatan Konduktor IEC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // Aktifkan mode gelap berbasis kelas
        }
    </script>
    <style>
        /* Sembunyikan ikon yang tidak aktif */
        .dark .sun-icon { display: block; }
        .dark .moon-icon { display: none; }
        html:not(.dark) .sun-icon { display: none; }
        html:not(.dark) .moon-icon { display: block; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-slate-900 min-h-screen p-4 transition-colors duration-300">

    <div class="w-full max-w-2xl mx-auto bg-white dark:bg-slate-800 rounded-xl shadow-md p-6 relative">
        
        <button id="theme-toggle" type="button" class="absolute top-4 right-4 text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-slate-700 focus:outline-none focus:ring-4 focus:ring-gray-200 dark:focus:ring-slate-700 rounded-lg text-sm p-2.5">
            <svg class="moon-icon w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
            <svg class="sun-icon w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm-.707 10.607a1 1 0 011.414 0l.707-.707a1 1 0 111.414 1.414l-.707.707a1 1 0 01-1.414 0zM2 11a1 1 0 100-2H1a1 1 0 100 2h1z"></path></svg>
        </button>

        <h1 class="text-xl font-bold text-center text-gray-800 dark:text-white pb-4 mb-6 border-b border-gray-200 dark:border-slate-700">
            Kalkulator Hambatan Konduktor IEC
        </h1>

        <div class="space-y-4">
            
            <div class="flex gap-4">
                <div class="w-1/2">
                    <label for="pembacaanAlat" class="block text-sm font-bold text-gray-700 dark:text-slate-300">Pembacaan Alat</label>
                    <input type="text" inputmode="decimal" name="pembacaanAlat" id="pembacaanAlat" class="mt-1 block w-full px-3 py-2 bg-white dark:bg-slate-700 border border-gray-300 dark:border-slate-600 rounded-xl shadow-sm placeholder-gray-400 dark:placeholder-slate-400 text-gray-900 dark:text-white focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
                <div class="w-1/2">
                    <label for="panjang" class="block text-sm font-bold text-gray-700 dark:text-slate-300">Panjang</label>
                    <input type="text" inputmode="decimal" name="panjang" id="panjang" class="mt-1 block w-full px-3 py-2 bg-white dark:bg-slate-700 border border-gray-300 dark:border-slate-600 rounded-xl shadow-sm placeholder-gray-400 dark:placeholder-slate-400 text-gray-900 dark:text-white focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
            </div>

            <div class="flex gap-4">
                <div class="w-1/2">
                    <label for="suhu" class="block text-sm font-bold text-gray-700 dark:text-slate-300">Suhu</label>
                    <input type="text" inputmode="decimal" name="suhu" id="suhu" class="mt-1 block w-full px-3 py-2 bg-white dark:bg-slate-700 border border-gray-300 dark:border-slate-600 rounded-xl shadow-sm placeholder-gray-400 dark:placeholder-slate-400 text-gray-900 dark:text-white focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
                <div class="w-1/2">
                    <label for="faktorKoreksi" class="block text-sm font-bold text-gray-700 dark:text-slate-300">Faktor Koreksi</label>
                    <input type="text" name="faktorKoreksi" id="faktorKoreksi" readonly class="mt-1 block w-full px-3 py-2 bg-gray-100 dark:bg-slate-600 border border-gray-300 dark:border-slate-500 rounded-xl shadow-sm text-gray-900 dark:text-white focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
            </div>

            <div class="flex gap-4 items-end">
                <div class="w-1/3">
                    <label for="konduktor" class="block text-sm font-bold text-gray-700 dark:text-slate-300">Konduktor</label>
                    <select id="konduktor" name="konduktor" class="mt-1 block w-full px-3 py-2 bg-white dark:bg-slate-700 border border-gray-300 dark:border-slate-600 rounded-xl shadow-sm text-gray-900 dark:text-white focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        <option>CU</option>
                        <option>AL</option>
                        <option>TCU</option>
                    </select>
                </div>
                <div class="w-1/3">
                    <label for="penampang" class="block text-sm font-bold text-gray-700 dark:text-slate-300">Penampang</label>
                     <select id="penampang" name="penampang" class="mt-1 block w-full px-3 py-2 bg-white dark:bg-slate-700 border border-gray-300 dark:border-slate-600 rounded-xl shadow-sm text-gray-900 dark:text-white focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        <option value="0.5">0.5</option>
                        <option value="0.75">0.75</option>
                    </select>
                </div>
                <div class="w-1/3">
                    <label for="spekMax" class="block text-sm font-bold text-gray-700 dark:text-slate-300">Spek. Max</label>
                    <input type="text" name="spekMax" id="spekMax" readonly class="mt-1 block w-full px-3 py-2 bg-gray-100 dark:bg-slate-600 border border-gray-300 dark:border-slate-500 rounded-xl shadow-sm text-gray-900 dark:text-white focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
            </div>

            <div class="pt-2">
                <label for="hasilKalkulasi" class="block text-sm font-bold text-gray-700 dark:text-slate-300">Hasil Kalkulasi</label>
                <input type="text" name="hasilKalkulasi" id="hasilKalkulasi" readonly class="mt-1 block w-full px-3 py-2 bg-gray-200 dark:bg-slate-600 border border-gray-300 dark:border-slate-500 rounded-xl shadow-sm placeholder-gray-400 dark:placeholder-slate-400 focus:outline-none focus:ring-indigo-500 font-bold text-lg text-center">
            </div>

            <p id="pesanHasil" class="text-center text-sm h-5"></p>
            
            <div class="pt-4 flex flex-wrap gap-2">
                <button type="button" class="flex-1 min-w-min justify-center py-2 px-4 border border-gray-300 dark:border-slate-600 rounded-xl shadow-sm text-sm font-medium text-gray-700 dark:text-slate-300 bg-white dark:bg-slate-700 hover:bg-gray-50 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    IEC
                </button>
                <button type="button" class="flex-1 min-w-min justify-center py-2 px-4 border border-gray-300 dark:border-slate-600 rounded-xl shadow-sm text-sm font-medium text-gray-700 dark:text-slate-300 bg-white dark:bg-slate-700 hover:bg-gray-50 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    ICEA
                </button>
                <button type="button" class="flex-1 min-w-min justify-center py-2 px-4 border border-gray-300 dark:border-slate-600 rounded-xl shadow-sm text-sm font-medium text-gray-700 dark:text-slate-300 bg-white dark:bg-slate-700 hover:bg-gray-50 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    AS/NZS
                </button>
                <button type="button" class="flex-1 min-w-min justify-center py-2 px-4 border border-gray-300 dark:border-slate-600 rounded-xl shadow-sm text-sm font-medium text-gray-700 dark:text-slate-300 bg-white dark:bg-slate-700 hover:bg-gray-50 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    SPLN
                </button>
            </div>

            <div class="pt-2 flex gap-2">
                <button type="button" onclick="history.back()" class="flex-1 justify-center py-2 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-gray-600 hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500">
                    Kembali
                </button>
                <a href="/" class="flex-1 text-center py-2 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    Beranda
                </a>
            </div>

        </div>

        <footer class="text-center text-gray-500 dark:text-slate-400 text-sm mt-6 pt-4 border-t border-gray-200 dark:border-slate-700">
            Williyanto Adi 2025
        </footer>

    </div>

    <script>
        // --- LOGIKA MODE GELAP ---
        const themeToggleBtn = document.getElementById('theme-toggle');

        // Cek tema tersimpan di localStorage atau preferensi sistem
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        themeToggleBtn.addEventListener('click', function() {
            // Toggle kelas 'dark'
            document.documentElement.classList.toggle('dark');

            // Simpan preferensi di localStorage
            if (document.documentElement.classList.contains('dark')) {
                localStorage.setItem('color-theme', 'dark');
            } else {
                localStorage.setItem('color-theme', 'light');
            }
        });

        // --- LOGIKA KALKULATOR ---
        // Data
        const correctionFactors = {
            CU: {"21.0":"0.9961","21.1":"0.9957","21.2":"0.9953","21.3":"0.9949","21.4":"0.9945","21.5":"0.9941"},
            AL: {"21.0":"0.9960","21.1":"0.9956","21.2":"0.9952","21.3":"0.9948","21.4":"0.9944","21.5":"0.9940"},
            TCU: {"21.0":"0.9961","21.1":"0.9957","21.2":"0.9953","21.3":"0.9949","21.4":"0.9945","21.5":"0.9941"}
        };
        const specMaxValues = {
            CU: {"0.5":"36,0","0.75":"24,5"},
            AL: {"0.5":"-","0.75":"-"},
            TCU: {"0.5":"36,7","0.75":"24,8"}
        };

        // Ambil elemen dari DOM
        const pembacaanAlatInput = document.getElementById('pembacaanAlat');
        const panjangInput = document.getElementById('panjang');
        const suhuInput = document.getElementById('suhu');
        const faktorKoreksiInput = document.getElementById('faktorKoreksi');
        const konduktorSelect = document.getElementById('konduktor');
        const penampangSelect = document.getElementById('penampang');
        const spekMaxInput = document.getElementById('spekMax');
        const hasilKalkulasiInput = document.getElementById('hasilKalkulasi');
        const pesanHasil = document.getElementById('pesanHasil');

        function validateNumericInput(event) {
            event.target.value = event.target.value.replace(/[^0-9.]/g, '');
        }

        function hitungHasil() {
            hasilKalkulasiInput.classList.remove('text-green-600', 'text-red-600');
            pesanHasil.className = 'text-center text-sm h-5';
            pesanHasil.innerText = '';

            const pembacaan = parseFloat(pembacaanAlatInput.value);
            const panjang = parseFloat(panjangInput.value);
            const koreksi = parseFloat(faktorKoreksiInput.value);

            if (!isNaN(pembacaan) && !isNaN(panjang) && !isNaN(koreksi) && panjang !== 0) {
                const hasil = (pembacaan / panjang) * koreksi;
                hasilKalkulasiInput.value = hasil.toFixed(4);

                const spekMaxString = spekMaxInput.value.replace(',', '.');
                const spekMax = parseFloat(spekMaxString);

                if (!isNaN(spekMax)) {
                    if (hasil < spekMax) {
                        hasilKalkulasiInput.classList.add('text-green-600');
                        pesanHasil.innerText = 'Hasil pengujian memenuhi spesifikasi standar.';
                        pesanHasil.classList.add('italic', 'text-green-600');
                    } else {
                        hasilKalkulasiInput.classList.add('text-red-600');
                        pesanHasil.innerText = 'Hasil pengujian tidak memenuhi spesifikasi standar.';
                        pesanHasil.classList.add('italic', 'text-red-600');
                    }
                }
            } else {
                hasilKalkulasiInput.value = '';
            }
        }
        
        function updateFaktorKoreksi() {
            const suhuValueRaw = suhuInput.value;
            const suhuNumber = parseFloat(suhuValueRaw);
            
            faktorKoreksiInput.value = '';
            
            if (!isNaN(suhuNumber)) {
                const suhuKey = suhuNumber.toFixed(1);
                const konduktorValue = konduktorSelect.value;
                const currentFactors = correctionFactors[konduktorValue];
                
                if (currentFactors && currentFactors[suhuKey]) {
                    faktorKoreksiInput.value = currentFactors[suhuKey];
                }
            }
            hitungHasil();
        }

        function updateSpekMax() {
            const konduktorValue = konduktorSelect.value;
            const penampangValue = penampangSelect.value;
            const currentSpec = specMaxValues[konduktorValue];

            if (currentSpec && currentSpec[penampangValue]) {
                spekMaxInput.value = currentSpec[penampangValue];
            } else {
                spekMaxInput.value = '';
            }
            hitungHasil();
        }

        pembacaanAlatInput.addEventListener('input', validateNumericInput);
        panjangInput.addEventListener('input', validateNumericInput);
        suhuInput.addEventListener('input', validateNumericInput);

        pembacaanAlatInput.addEventListener('input', hitungHasil);
        panjangInput.addEventListener('input', hitungHasil);
        suhuInput.addEventListener('input', updateFaktorKoreksi);

        konduktorSelect.addEventListener('change', () => {
            updateFaktorKoreksi();
            updateSpekMax();
        });
        penampangSelect.addEventListener('change', updateSpekMax);

        updateFaktorKoreksi();
        updateSpekMax();
    </script>

</body>
</html>
