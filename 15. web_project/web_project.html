<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Hambatan Konduktor IEC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, .bg-white, .bg-gray-100 {
            transition: background-color 0.3s, color 0.3s;
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen p-4">

    <div class="w-full max-w-2xl mx-auto bg-white dark:bg-gray-800 rounded-xl shadow-md p-6">
        
        <h1 class="text-xl font-bold text-center text-gray-800 dark:text-gray-100 pb-4 mb-6 border-b border-gray-200 dark:border-gray-700">
            Kalkulator Hambatan Konduktor IEC
        </h1>

        <div class="space-y-4">
            
            <div class="flex gap-4">
                <div class="w-1/2">
                    <label for="pembacaanAlat" class="block text-sm font-bold text-gray-700 dark:text-gray-300">Pembacaan Alat</label>
                    <input type="text" inputmode="decimal" name="pembacaanAlat" id="pembacaanAlat" class="mt-1 block w-full px-3 py-2 bg-white dark:bg-gray-700 dark:text-gray-200 border border-gray-300 dark:border-gray-600 rounded-xl shadow-sm placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
                <div class="w-1/2">
                    <label for="panjang" class="block text-sm font-bold text-gray-700 dark:text-gray-300">Panjang (m)</label>
                    <input type="text" inputmode="decimal" name="panjang" id="panjang" class="mt-1 block w-full px-3 py-2 bg-white dark:bg-gray-700 dark:text-gray-200 border border-gray-300 dark:border-gray-600 rounded-xl shadow-sm placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
            </div>

            <div class="flex gap-4">
                <div class="w-1/2">
                    <label for="suhu" class="block text-sm font-bold text-gray-700 dark:text-gray-300">Suhu (°C)</label>
                    <input type="text" inputmode="decimal" name="suhu" id="suhu" class="mt-1 block w-full px-3 py-2 bg-white dark:bg-gray-700 dark:text-gray-200 border border-gray-300 dark:border-gray-600 rounded-xl shadow-sm placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
                <div class="w-1/2">
                    <label for="faktorKoreksi" class="block text-sm font-bold text-gray-700 dark:text-gray-300">Faktor Koreksi</label>
                    <input type="text" name="faktorKoreksi" id="faktorKoreksi" readonly class="mt-1 block w-full px-3 py-2 bg-gray-100 dark:bg-gray-600 dark:text-gray-300 border border-gray-300 dark:border-gray-600 rounded-xl shadow-sm placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
            </div>

            <div class="flex gap-4 items-end">
                <div class="w-1/3">
                    <label for="konduktor" class="block text-sm font-bold text-gray-700 dark:text-gray-300">Konduktor</label>
                    <select id="konduktor" name="konduktor" class="mt-1 block w-full px-3 py-2 bg-white dark:bg-gray-700 dark:text-gray-200 border border-gray-300 dark:border-gray-600 rounded-xl shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        <option>CU</option>
                        <option>AL</option>
                        <option>TCU</option>
                    </select>
                </div>
                <div class="w-1/3">
                    <label for="penampang" class="block text-sm font-bold text-gray-700 dark:text-gray-300">Penampang (mm²)</label>
                     <select id="penampang" name="penampang" class="mt-1 block w-full px-3 py-2 bg-white dark:bg-gray-700 dark:text-gray-200 border border-gray-300 dark:border-gray-600 rounded-xl shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        <option value="0.5">0.5</option>
                        <option value="0.75">0.75</option>
                    </select>
                </div>
                <div class="w-1/3">
                    <label for="spekMax" class="block text-sm font-bold text-gray-700 dark:text-gray-300">Spek. Max</label>
                    <input type="text" name="spekMax" id="spekMax" readonly class="mt-1 block w-full px-3 py-2 bg-gray-100 dark:bg-gray-600 dark:text-gray-300 border border-gray-300 dark:border-gray-600 rounded-xl shadow-sm placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
            </div>

            <div class="pt-2">
                <label for="hasilKalkulasi" class="block text-sm font-bold text-gray-700 dark:text-gray-300">Hasil Kalkulasi (Ω/km)</label>
                <input type="text" name="hasilKalkulasi" id="hasilKalkulasi" readonly class="mt-1 block w-full px-3 py-2 bg-gray-200 dark:bg-gray-500 dark:text-gray-200 border border-gray-300 dark:border-gray-500 rounded-xl shadow-sm placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-indigo-500 font-bold text-lg text-center">
            </div>

            <p id="pesanHasil" class="text-center text-sm h-5"></p>
            
            <div class="pt-4 flex flex-wrap gap-2">
                 <a href="https://www.google.com" class="flex-1 text-center min-w-min justify-center py-2 px-4 border border-gray-300 dark:border-gray-600 rounded-xl shadow-sm text-sm font-bold text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    IEC
                </a>
                <a href="https://www.youtube.com" class="flex-1 text-center min-w-min justify-center py-2 px-4 border border-gray-300 dark:border-gray-600 rounded-xl shadow-sm text-sm font-bold text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    ICEA
                </a>
                <a href="https://www.wikipedia.org" class="flex-1 text-center min-w-min justify-center py-2 px-4 border border-gray-300 dark:border-gray-600 rounded-xl shadow-sm text-sm font-bold text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    AS/NZS
                </a>
                <a href="#" class="flex-1 text-center min-w-min justify-center py-2 px-4 border border-gray-300 dark:border-gray-600 rounded-xl shadow-sm text-sm font-bold text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    SPLN
                </a>
            </div>

            <div class="pt-2 flex gap-2">
                <button type="button" onclick="history.back()" class="flex-1 justify-center py-2 px-4 border border-gray-300 rounded-xl shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Kembali
                </button>
                <button type="button" id="hapusSemuaBtn" class="flex-1 justify-center py-2 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-orange-500 hover:bg-orange-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-orange-500">
                    Hapus Semua
                </button>
                <button type="button" id="theme-toggle-btn" class="flex-1 justify-center py-2 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5 mx-auto" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                    <svg id="theme-toggle-light-icon" class="hidden w-5 h-5 mx-auto" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 5.05A1 1 0 003.636 6.464l.707.707a1 1 0 001.414-1.414l-.707-.707zM3 11a1 1 0 100-2H2a1 1 0 100 2h1zM6.464 16.364l-.707.707a1 1 0 001.414 1.414l.707-.707a1 1 0 00-1.414-1.414z" fill-rule="evenodd"></path></svg>
                </button>
                <a href="/" class="flex-1 text-center py-2 px-4 border border-gray-300 rounded-xl shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Beranda
                </a>
            </div>

        </div>

        <footer class="text-center text-gray-500 dark:text-gray-400 text-sm mt-6 pt-4 border-t border-gray-200 dark:border-gray-700">
            Williyanto Adi 2025
        </footer>

    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {

        // Data
        const correctionFactors = {
            CU: {"21.0":"0.9961","21.1":"0.9957","21.2":"0.9953","21.3":"0.9949","21.4":"0.9945","21.5":"0.9941"},
            AL: {"21.0":"0.9960","21.1":"0.9956","21.2":"0.9952","21.3":"0.9948","21.4":"0.9944","21.5":"0.9940"},
            TCU: {"21.0":"0.9961","21.1":"0.9957","21.2":"0.9953","21.3":"0.9949","21.4":"0.9945","21.5":"0.9941"}
        };
        const specMaxValues = {
            CU: {"0.5":"36,0","0.75":"24,5"},
            AL: {"0.5":"-","0.75":"-"},
            TCU: {"0.5":"36,7","0.75":"24,8"}
        };

        // Ambil elemen dari DOM
        const pembacaanAlatInput = document.getElementById('pembacaanAlat');
        const panjangInput = document.getElementById('panjang');
        const suhuInput = document.getElementById('suhu');
        const faktorKoreksiInput = document.getElementById('faktorKoreksi');
        const konduktorSelect = document.getElementById('konduktor');
        const penampangSelect = document.getElementById('penampang');
        const spekMaxInput = document.getElementById('spekMax');
        const hasilKalkulasiInput = document.getElementById('hasilKalkulasi');
        const pesanHasil = document.getElementById('pesanHasil');
        const hapusSemuaBtn = document.getElementById('hapusSemuaBtn');
        const themeToggleBtn = document.getElementById('theme-toggle-btn');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');
        const htmlEl = document.documentElement;

        // ==== LOGIKA MODE GELAP/TERANG (SUPER STABIL) ====
        const updateIcons = (isDark) => {
            darkIcon.classList.toggle('hidden', !isDark);
            lightIcon.classList.toggle('hidden', isDark);
        };

        const initializeTheme = () => {
            const savedTheme = localStorage.getItem('color-theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const isDark = savedTheme === 'dark' || (!savedTheme && prefersDark);
            
            htmlEl.classList.toggle('dark', isDark);
            updateIcons(isDark);
        };

        themeToggleBtn.addEventListener('click', () => {
            const isDark = htmlEl.classList.toggle('dark');
            localStorage.setItem('color-theme', isDark ? 'dark' : 'light');
            updateIcons(isDark);
        });

        function validateNumericInput(event) {
            event.target.value = event.target.value.replace(/[^0-9.]/g, '');
        }

        function hitungHasil() {
            hasilKalkulasiInput.classList.remove('text-green-600', 'text-red-600', 'dark:text-green-400', 'dark:text-red-400');
            pesanHasil.className = 'text-center text-sm h-5';
            pesanHasil.innerText = '';
            const pembacaan = parseFloat(pembacaanAlatInput.value);
            const panjang = parseFloat(panjangInput.value);
            const koreksi = parseFloat(faktorKoreksiInput.value);
            if (!isNaN(pembacaan) && !isNaN(panjang) && !isNaN(koreksi) && panjang !== 0) {
                const hasil = (pembacaan / panjang) * koreksi;
                hasilKalkulasiInput.value = hasil.toFixed(4);
                const spekMaxString = spekMaxInput.value.replace(',', '.');
                const spekMax = parseFloat(spekMaxString);
                if (!isNaN(spekMax)) {
                    if (hasil < spekMax) {
                        hasilKalkulasiInput.classList.add('text-green-600', 'dark:text-green-400');
                        pesanHasil.innerText = 'Hasil pengujian memenuhi spesifikasi standar.';
                        pesanHasil.classList.add('italic', 'text-green-600', 'dark:text-green-400');
                    } else {
                        hasilKalkulasiInput.classList.add('text-red-600', 'dark:text-red-400');
                        pesanHasil.innerText = 'Hasil pengujian tidak memenuhi spesifikasi standar.';
                        pesanHasil.classList.add('italic', 'text-red-600', 'dark:text-red-400');
                    }
                }
            } else {
                hasilKalkulasiInput.value = '';
            }
        }
        
        function updateFaktorKoreksi() {
            const suhuValueRaw = suhuInput.value;
            const suhuNumber = parseFloat(suhuValueRaw);
            faktorKoreksiInput.value = '';
            if (!isNaN(suhuNumber)) {
                const suhuKey = suhuNumber.toFixed(1);
                const konduktorValue = konduktorSelect.value;
                const currentFactors = correctionFactors[konduktorValue];
                if (currentFactors && currentFactors[suhuKey]) {
                    faktorKoreksiInput.value = currentFactors[suhuKey];
                }
            }
            hitungHasil();
        }

        function updateSpekMax() {
            const konduktorValue = konduktorSelect.value;
            const penampangValue = penampangSelect.value;
            const currentSpec = specMaxValues[konduktorValue];
            if (currentSpec && currentSpec[penampangValue]) {
                spekMaxInput.value = currentSpec[penampangValue];
            } else {
                spekMaxInput.value = '';
            }
            hitungHasil();
        }

        function hapusSemua() {
            pembacaanAlatInput.value = '';
            panjangInput.value = '';
            suhuInput.value = '';
            updateFaktorKoreksi();
        }

        // Tambahkan semua event listener
        pembacaanAlatInput.addEventListener('input', validateNumericInput);
        panjangInput.addEventListener('input', validateNumericInput);
        suhuInput.addEventListener('input', validateNumericInput);
        pembacaanAlatInput.addEventListener('input', hitungHasil);
        panjangInput.addEventListener('input', hitungHasil);
        suhuInput.addEventListener('input', updateFaktorKoreksi);
        konduktorSelect.addEventListener('change', () => {
            updateFaktorKoreksi();
            updateSpekMax();
        });
        penampangSelect.addEventListener('change', updateSpekMax);
        hapusSemuaBtn.addEventListener('click', hapusSemua);

        // Panggil fungsi inisialisasi
        initializeTheme();
        updateFaktorKoreksi();
        updateSpekMax();
    });
    </script>

</body>
</html>
