<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Hambatan Konduktor IEC</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">

    <div class="w-full max-w-2xl mx-auto bg-white rounded-xl shadow-md p-6">
        
        <h1 class="text-xl font-bold text-center text-gray-800 pb-4 mb-6 border-b border-gray-200">
            Kalkulator Hambatan Konduktor IEC
        </h1>

        <div class="space-y-4">
            
            <div class="flex gap-4">
                <div class="w-1/2">
                    <label for="pembacaanAlat" class="block text-sm font-bold text-gray-700">Pembacaan Alat</label>
                    <input type="text" name="pembacaanAlat" id="pembacaanAlat" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
                <div class="w-1/2">
                    <label for="panjang" class="block text-sm font-bold text-gray-700">Panjang</label>
                    <input type="text" name="panjang" id="panjang" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
            </div>

            <div class="flex gap-4">
                <div class="w-1/2">
                    <label for="suhu" class="block text-sm font-bold text-gray-700">Suhu</label>
                    <input type="text" name="suhu" id="suhu" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
                <div class="w-1/2">
                    <label for="faktorKoreksi" class="block text-sm font-bold text-gray-700">Faktor Koreksi</label>
                    <input type="text" name="faktorKoreksi" id="faktorKoreksi" readonly class="mt-1 block w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
            </div>

            <div class="flex gap-4 items-end">
                <div class="w-1/3">
                    <label for="konduktor" class="block text-sm font-bold text-gray-700">Konduktor</label>
                    <select id="konduktor" name="konduktor" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        <option>CU</option>
                        <option>AL</option>
                        <option>TCU</option>
                    </select>
                </div>
                <div class="w-1/3">
                    <label for="penampang" class="block text-sm font-bold text-gray-700">Penampang</label>
                     <select id="penampang" name="penampang" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        <option value="0.5">0.5</option>
                        <option value="0.75">0.75</option>
                    </select>
                </div>
                <div class="w-1/3">
                    <label for="spekMax" class="block text-sm font-bold text-gray-700">Spek. Max</label>
                    <input type="text" name="spekMax" id="spekMax" readonly class="mt-1 block w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
            </div>

            <div class="pt-2">
                <label for="hasilKalkulasi" class="block text-sm font-bold text-gray-700">Hasil Kalkulasi</label>
                <input type="text" name="hasilKalkulasi" id="hasilKalkulasi" readonly class="mt-1 block w-full px-3 py-2 bg-gray-200 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 font-bold text-lg text-center">
            </div>
            
            <div class="pt-4 flex flex-wrap gap-2">
                <button type="button" class="flex-1 min-w-min justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    IEC
                </button>
                <button type="button" class="flex-1 min-w-min justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    ICEA
                </button>
                <button type="button" class="flex-1 min-w-min justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    AS/NZS
                </button>
                <button type="button" class="flex-1 min-w-min justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    SPLN
                </button>
            </div>
        </div>

        <footer class="text-center text-gray-500 text-sm mt-6 pt-4 border-t border-gray-200">
            Williyanto Adi 2025
        </footer>

    </div>

    <script>
        // Data
        const correctionFactors = {
            CU: {"21.0":"0.9961","21.1":"0.9957","21.2":"0.9953","21.3":"0.9949","21.4":"0.9945","21.5":"0.9941"},
            AL: {"21.0":"0.9960","21.1":"0.9956","21.2":"0.9952","21.3":"0.9948","21.4":"0.9944","21.5":"0.9940"},
            TCU: {"21.0":"0.9961","21.1":"0.9957","21.2":"0.9953","21.3":"0.9949","21.4":"0.9945","21.5":"0.9941"}
        };
        const specMaxValues = {
            CU: {"0.5":"36,0","0.75":"24,5"},
            AL: {"0.5":"-","0.75":"-"},
            TCU: {"0.5":"36,7","0.75":"24,8"}
        };

        // Ambil semua elemen dari DOM
        const pembacaanAlatInput = document.getElementById('pembacaanAlat');
        const panjangInput = document.getElementById('panjang');
        const suhuInput = document.getElementById('suhu');
        const faktorKoreksiInput = document.getElementById('faktorKoreksi');
        const konduktorSelect = document.getElementById('konduktor');
        const penampangSelect = document.getElementById('penampang');
        const spekMaxInput = document.getElementById('spekMax');
        const hasilKalkulasiInput = document.getElementById('hasilKalkulasi');

        // Fungsi Kalkulasi Utama
        function hitungHasil() {
            const pembacaan = parseFloat(pembacaanAlatInput.value);
            const panjang = parseFloat(panjangInput.value);
            const koreksi = parseFloat(faktorKoreksiInput.value);

            // Pastikan semua nilai adalah angka dan panjang tidak nol
            if (!isNaN(pembacaan) && !isNaN(panjang) && !isNaN(koreksi) && panjang !== 0) {
                const hasil = (pembacaan / panjang) * koreksi;
                hasilKalkulasiInput.value = hasil.toFixed(4); // Tampilkan hasil dengan 4 angka desimal
            } else {
                hasilKalkulasiInput.value = ''; // Kosongkan jika input tidak valid
            }
        }
        
        function updateFaktorKoreksi() {
            const suhuValue = suhuInput.value;
            const konduktorValue = konduktorSelect.value;
            const currentFactors = correctionFactors[konduktorValue];
            
            if (currentFactors && currentFactors[suhuValue]) {
                faktorKoreksiInput.value = currentFactors[suhuValue];
            } else {
                faktorKoreksiInput.value = '';
            }
            hitungHasil(); // Panggil kalkulasi ulang setelah faktor koreksi diperbarui
        }

        function updateSpekMax() {
            const konduktorValue = konduktorSelect.value;
            const penampangValue = penampangSelect.value;
            const currentSpec = specMaxValues[konduktorValue];

            if (currentSpec && currentSpec[penampangValue]) {
                spekMaxInput.value = currentSpec[penampangValue];
            } else {
                spekMaxInput.value = '';
            }
        }

        // Tambahkan event listener
        pembacaanAlatInput.addEventListener('input', hitungHasil);
        panjangInput.addEventListener('input', hitungHasil);
        suhuInput.addEventListener('input', updateFaktorKoreksi);

        konduktorSelect.addEventListener('change', () => {
            updateFaktorKoreksi();
            updateSpekMax();
        });
        penampangSelect.addEventListener('change', updateSpekMax);

        // Panggil fungsi saat halaman dimuat untuk mengisi nilai awal
        updateFaktorKoreksi();
        updateSpekMax();
        hitungHasil();
    </script>

</body>
</html>
