<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MyMoney Web</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">MyMoney Web</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="mb-4">
            <button class="btn btn-success"><i class="bi bi-plus-circle"></i> Tambah Pemasukan</button>
            <button class="btn btn-danger"><i class="bi bi-dash-circle"></i> Tambah Pengeluaran</button>
            <button class="btn btn-primary"><i class="bi bi-arrow-left-right"></i> Buat Transfer</button>
        </div>

        <div class="row">
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Dompet Cash</h5>
                        <p class="card-text fs-4">Rp 500.000</p>
                        <a href="#" class="btn btn-sm btn-outline-secondary">Lihat Detail</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">BCA</h5>
                        <p class="card-text fs-4">Rp 10.000.000</p>
                        <a href="#" class="btn btn-sm btn-outline-secondary">Lihat Detail</a>
                    </div>
                </div>
            </div>
        </div>

        <h3 class="mt-4">Transaksi Terbaru</h3>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Tanggal</th>
                    <th>Kategori</th>
                    <th>Dompet</th>
                    <th>Jumlah</th>
                    <th>Tipe</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>29/09/2025</td>
                    <td>Gaji</td>
                    <td>BCA</td>
                    <td class="text-success">+ Rp 10.000.000</td>
                    <td>Pemasukan</td>
                </tr>
                <tr>
                    <td>29/09/2025</td>
                    <td>Makan Siang</td>
                    <td>Dompet Cash</td>
                    <td class="text-danger">- Rp 25.000</td>
                    <td>Pengeluaran</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
