<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MyMoney Web (Responsive)</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">MyMoney Web</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-grid gap-2 d-md-flex justify-content-md-start mb-4">
            <button class="btn btn-success"><i class="bi bi-plus-circle"></i> Tambah Pemasukan</button>
            <button class="btn btn-danger"><i class="bi bi-dash-circle"></i> Tambah Pengeluaran</button>
            <button class="btn btn-primary"><i class="bi bi-arrow-left-right"></i> Buat Transfer</button>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Dompet Cash</h5>
                        <p class="card-text fs-4 fw-bold">Rp 500.000</p>
                        <a href="#" class="btn btn-sm btn-outline-secondary">Lihat Detail</a>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">BCA</h5>
                        <p class="card-text fs-4 fw-bold">Rp 10.000.000</p>
                        <a href="#" class="btn btn-sm btn-outline-secondary">Lihat Detail</a>
                    </div>
                </div>
            </div>
        </div>

        <h3 class="mt-4">Transaksi Terbaru</h3>
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Kategori</th>
                        <th>Dompet</th>
                        <th class="text-end">Jumlah</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>29/09/25</td>
                        <td>Gaji</td>
                        <td>BCA</td>
                        <td class="text-end text-success fw-bold">+ Rp 10.000.000</td>
                    </tr>
                    <tr>
                        <td>29/09/25</td>
                        <td>Makan Siang</td>
                        <td>Dompet Cash</td>
                        <td class="text-end text-danger">- Rp 25.000</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
