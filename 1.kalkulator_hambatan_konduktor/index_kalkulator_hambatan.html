    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        /* Mengaplikasikan font Inter dan transisi dasar */
        body {
            font-family: 'Inter', sans-serif;
        }
        .btn-custom {
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 .5rem 1rem rgba(0,0,0,.15)!important;
        }
    </style>

    <script>
        // Skrip untuk mencegah Flash of Unstyled Content (FOUC) saat memuat tema
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
          document.documentElement.setAttribute('data-bs-theme', savedTheme);
        }
    </script>
</head>

            </div>

            <div class="col-6">
                <a href="./icea_v2.html" class="btn btn-custom w-100 h-100 p-3 text-white shadow-sm d-flex flex-column align-items-center justify-content-center" style="background-color: #3498db; border-color: #3498db;">
                    <img src="../icons/logo_icea.png" alt="ICEA Logo" class="rounded-circle shadow-lg mb-2" style="width: 64px; height: 64px; background-image: linear-gradient(135deg, #3498db, #2980b9);">
                    <span class="fw-bold">Standar ICEA</span>

            </div>

            <div class="col-6">

            <div class="col-6">

        </div>

        <div class="d-flex align-items-center justify-content-center w-100 gap-4 mt-3">
            <a href="./index.html" class="btn btn-link text-decoration-none fw-semibold">
                <i class="fa-solid fa-home"></i> Beranda
            </a>
            <button id="modeToggle" class="btn btn-outline-secondary d-flex align-items-center gap-2" aria-label="Toggle dark and light mode">
                <i class="fa-solid fa-moon"></i>
                <span id="modeText">Terang</span>
            </button>
        </div>

        <hr class="w-75 mx-auto mt-4 mb-3">
        
        <div class="text-muted small">
            Made by Williyanto Adi 2025
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const modeToggleBtn = document.getElementById('modeToggle');
            const htmlElement = document.documentElement;
            const modeIcon = modeToggleBtn.querySelector('i');
            const modeText = document.getElementById('modeText');

            const updateModeUI = () => {
                const currentTheme = htmlElement.getAttribute('data-bs-theme');
                if (currentTheme === 'dark') {
                    modeIcon.classList.remove('fa-moon');
                    modeIcon.classList.add('fa-sun');
                    modeText.textContent = 'Mode Gelap';
                } else {
                    modeIcon.classList.remove('fa-sun');
                    modeIcon.classList.add('fa-moon');
                    modeText.textContent = 'Mode Terang';
                }
            };

            updateModeUI();

            modeToggleBtn.addEventListener('click', () => {
                const currentTheme = htmlElement.getAttribute('data-bs-theme');
                if (currentTheme === 'dark') {
                    htmlElement.removeAttribute('data-bs-theme');
                    localStorage.setItem('theme', 'light');
                } else {
                    htmlElement.setAttribute('data-bs-theme', 'dark');
                    localStorage.setItem('theme', 'dark');
                }
                updateModeUI();
            });
        });
    </script>
</body>
</html>
