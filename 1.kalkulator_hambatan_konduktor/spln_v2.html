<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Hambatan Konduktor SPLN</title>
    <link rel="icon" type="image/png" href="../icons/logo_spln.png"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            transition: background-color 0.3s, color 0.3s;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">

    <div class="w-full max-w-2xl mx-auto bg-white rounded-xl shadow-md p-6">
        
        <h1 class="text-xl font-bold text-center text-gray-800 pb-4 mb-6 border-b border-gray-200">
            Kalkulator Hambatan Konduktor SPLN
        </h1>

        <div class="space-y-4">
            
            <div class="flex gap-4">
                <div class="w-1/2">
                    <label for="pembacaanAlat" class="block text-sm font-bold text-gray-700">Pembacaan Alat (mΩ)</label>
                    <input type="text" inputmode="decimal" name="pembacaanAlat" id="pembacaanAlat" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="dalam satuan mΩ">
                </div>
                <div class="w-1/2">
                    <label for="panjang" class="block text-sm font-bold text-gray-700">Panjang (m)</label>
                    <input type="text" inputmode="decimal" name="panjang" id="panjang" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="dalam satuan meter">
                </div>
            </div>

            <div class="flex gap-4">
                <div class="w-1/2">
                    <label for="suhu" class="block text-sm font-bold text-gray-700">Suhu (°C)</label>
                    <input type="text" inputmode="decimal" name="suhu" id="suhu" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="21 - 40 °C">
                </div>
                <div class="w-1/2">
                    <label for="faktorKoreksi" class="block text-sm font-bold text-gray-700">Faktor Koreksi</label>
                    <input type="text" name="faktorKoreksi" id="faktorKoreksi" readonly class="mt-1 block w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
            </div>

            <div class="flex gap-4 items-end">
                <div class="w-1/3">
                    <label for="konduktor" class="block text-sm font-bold text-gray-700">Konduktor</label>
                    <select id="konduktor" name="konduktor" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        <option>AAAC</option>
                        <option>ACSR</option>
                    </select>
                </div>
                <div class="w-1/3">
                    <label for="penampang" class="block text-sm font-bold text-gray-700">Penampang</label>
                     <select id="penampang" name="penampang" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        </select>
                </div>
                <div class="w-1/3">
                    <label for="spekMax" class="block text-sm font-bold text-gray-700">Spek. Max</label>
                    <input type="text" name="spekMax" id="spekMax" readonly class="mt-1 block w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
            </div>

            <div class="pt-2">
                <label for="hasilKalkulasi" class="block text-sm font-bold text-gray-700">Hasil Kalkulasi (Ω/km)</label>
                <input type="text" name="hasilKalkulasi" id="hasilKalkulasi" readonly class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 font-bold text-lg text-center">
            </div>

            <p id="pesanHasil" class="text-center text-sm h-5"></p>
            
            <div class="pt-4 flex flex-wrap gap-2">
                 <a href="./iec_v2.html" class="flex-1 text-center min-w-min justify-center py-2 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-blue-500 hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    IEC
                </a>
                <a href="./icea_v2.html" class="flex-1 text-center min-w-min justify-center py-2 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-green-500 hover:bg-green-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                    ICEA
                </a>
                <a href="./as_v2.html" class="flex-1 text-center min-w-min justify-center py-2 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-indigo-500 hover:bg-indigo-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    AS/NZS
                </a>
                <a href="./spln_v2.html" class="flex-1 text-center min-w-min justify-center py-2 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-teal-500 hover:bg-teal-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500">
                    SPLN
                </a>
            </div>

            <div class="pt-2 flex gap-2">
                <button type="button" onclick="history.back()" class="flex-1 justify-center py-2 px-4 border border-gray-300 rounded-xl shadow-sm text-sm font-bold text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Kembali
                </button>
                <button type="button" id="hapusBtn" class="flex-1 justify-center py-2 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
                    Hapus
                </button>
                <a href="./index_kalkulator_hambatan.html" class="flex-1 text-center py-2 px-4 border border-gray-300 rounded-xl shadow-sm text-sm font-bold text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Beranda
                </a>
            </div>

        </div>

        <footer class="text-center text-gray-500 text-sm mt-6 pt-4 border-t border-gray-200">
            Williyanto Adi 2025
        </footer>

    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {

        // Data
        const temperatureData = {
            "21": "0.996", "22": "0.992", "23": "0.988", "24": "0.984", "25": "0.980",
            "26": "0.977", "27": "0.973", "28": "0.969", "29": "0.965", "30": "0.962",
            "31": "0.958", "32": "0.954", "33": "0.951", "34": "0.947", "35": "0.943",
            "36": "0.940", "37": "0.934", "38": "0.933", "39": "0.929", "40": "0.926"
        };

        const correctionFactors = {
            AAAC: temperatureData,
            ACSR: temperatureData
        };

        // Menggunakan Map untuk menjaga urutan
        const specMaxValues = {
            AAAC: new Map([
                ["16", "1,955"], ["25", "1,183"], ["35", "0,958"], ["50/7", "0,665"],
                ["50/19", "0,724"], ["55", "0,567"], ["70", "0,438"], ["95", "0,355"],
                ["100", "0,332"], ["120", "0,293"], ["150/19", "0,210"], ["150/37", "0,225"],
                ["185", "0,183"], ["240/19", "0,137"], ["240/61", "0,139"], ["300", "0,111"],
                ["400", "0,077"], ["500", "0,066"], ["630", "0,052"], ["800", "0,044"],
                ["1000", "0,033"]
            ]),
            ACSR: new Map([
                ["16/2,5", "1,879"], ["25/4", "1,203"], ["35/6", "0,8353"],
                ["44/32", "-"], ["50/8", "0,5946"], ["50/30", "0,5644"],
                ["70/12", "0,4130"], ["95/15", "0,3053"], ["95/55", "0,2992"],
                ["105/75", "-"], ["120/20", "0,2374"], ["120/70", "0,2364"],
                ["125/30", "0,2259"], ["150/25", "0,1939"], ["170/40", "0,1682"],
                ["185/30", "0,1571"], ["210/35", "0,1980"], ["210/50", "0,1363"],
                ["230/30", "0,1249"], ["240/40", "0,1183"], ["265/35", "0,1094"],
                ["300/50", "0,09497"], ["305/40", "0,09490"], ["340/30", "0,09513"],
                ["360/50", "0,07573"], ["385/33", "0,07432"], ["435/55", "0,06656"],
                ["430/40", "0,05437"], ["490/65", "0,05896"], ["493/35", "0,05142"],
                ["510/45", "0,03957"], ["550/70", "0,05259"], ["560/50", "0,03142"],
                ["570/40", "0,05057"], ["650/45", "0,0442"], ["680/83", "0,04260"],
                ["1043/45", "-"]
            ])
        };

        // Ambil elemen dari DOM
        const pembacaanAlatInput = document.getElementById('pembacaanAlat');
        const panjangInput = document.getElementById('panjang');
        const suhuInput = document.getElementById('suhu');
        const faktorKoreksiInput = document.getElementById('faktorKoreksi');
        const konduktorSelect = document.getElementById('konduktor');
        const penampangSelect = document.getElementById('penampang');
        const spekMaxInput = document.getElementById('spekMax');
        const hasilKalkulasiInput = document.getElementById('hasilKalkulasi');
        const pesanHasil = document.getElementById('pesanHasil');
        const hapusBtn = document.getElementById('hapusBtn');

        function validateNumericInput(event) {
            event.target.value = event.target.value.replace(/[^0-9.]/g, '');
        }

        function hitungHasil() {
            hasilKalkulasiInput.classList.remove('text-green-500', 'text-red-500');
            pesanHasil.className = 'text-center text-sm h-5';
            pesanHasil.innerText = '';
            
            const pembacaan = parseFloat(pembacaanAlatInput.value);
            const panjang = parseFloat(panjangInput.value);
            const koreksi = parseFloat(faktorKoreksiInput.value);

            if (!isNaN(pembacaan) && !isNaN(panjang) && !isNaN(koreksi) && panjang !== 0) {
                const hasil = (pembacaan / panjang) * koreksi;
                hasilKalkulasiInput.value = hasil.toFixed(4);
                
                const spekMaxString = spekMaxInput.value.replace(',', '.');
                const spekMax = parseFloat(spekMaxString);

                if (!isNaN(spekMax)) {
                    if (hasil < spekMax) {
                        hasilKalkulasiInput.classList.add('text-green-500');
                        pesanHasil.innerText = 'Hasil pengujian memenuhi spesifikasi standar.';
                        pesanHasil.classList.add('italic', 'text-green-500');
                    } else {
                        hasilKalkulasiInput.classList.add('text-red-500');
                        pesanHasil.innerText = 'Hasil pengujian tidak memenuhi spesifikasi standar.';
                        pesanHasil.classList.add('italic', 'text-red-500');
                    }
                }
            } else {
                hasilKalkulasiInput.value = '';
            }
        }
        
        function updateFaktorKoreksi() {
            const suhuValue = Math.round(parseFloat(suhuInput.value));
            const konduktorValue = konduktorSelect.value;
            faktorKoreksiInput.value = ''; // Reset
            
            if (!isNaN(suhuValue)) {
                const currentFactors = correctionFactors[konduktorValue];
                if (currentFactors && currentFactors[suhuValue]) {
                    faktorKoreksiInput.value = currentFactors[suhuValue];
                }
            }
            hitungHasil();
        }

        function updateSpekMax() {
            const konduktorValue = konduktorSelect.value;
            const penampangValue = penampangSelect.value;
            const currentSpecMap = specMaxValues[konduktorValue]; // Ini adalah Map
            const specValue = currentSpecMap.get(penampangValue); // Menggunakan .get() untuk Map
            
            if (specValue) {
                spekMaxInput.value = specValue;
            } else {
                spekMaxInput.value = '';
            }
            hitungHasil();
        }

        function updatePenampangOptions() {
            const konduktorValue = konduktorSelect.value;
            const penampangDataMap = specMaxValues[konduktorValue]; // Ini adalah Map
            
            penampangSelect.innerHTML = '';

            // Looping pada Map akan menjaga urutan
            penampangDataMap.forEach((value, key) => {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = `${key} mm²`;
                penampangSelect.appendChild(option);
            });
            updateSpekMax();
        }

        function hapus() {
            pembacaanAlatInput.value = '';
            panjangInput.value = '';
            suhuInput.value = '';
            updateFaktorKoreksi(); 
        }

        // Tambahkan semua event listener
        pembacaanAlatInput.addEventListener('input', validateNumericInput);
        panjangInput.addEventListener('input', validateNumericInput);
        suhuInput.addEventListener('input', validateNumericInput);
        
        pembacaanAlatInput.addEventListener('input', hitungHasil);
        panjangInput.addEventListener('input', hitungHasil);
        suhuInput.addEventListener('input', updateFaktorKoreksi);
        
        konduktorSelect.addEventListener('change', () => {
            updatePenampangOptions();
            updateFaktorKoreksi(); 
        });
        penampangSelect.addEventListener('change', updateSpekMax);
        hapusBtn.addEventListener('click', hapus);

        // Panggil fungsi inisialisasi saat halaman dimuat
        updatePenampangOptions();
    });
    </script>

</body>
</html>
